<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Flow DB — Offline Edition</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- Firebase App (compat CDN) for cloud sync – works on GitHub Pages -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- Global Styles -->
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .carousel-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      border-width: 1px;
      font-size: 14px;
      font-weight: 500;
      transition-property: all;
      transition-duration: 200ms;
      cursor: pointer;
    }

    .progress-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      border-width: 1px;
      font-weight: 600;
      transition-property: all;
      transition-duration: 150ms;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen transition-colors duration-300">

  <!-- Core App Container -->
  <div id="app">
    <!-- Rendered dynamically by JavaScript -->
  </div>

  <script>
    // Constants & Default seeds
    const STORAGE_ITEMS_KEY = "media_flow_db_items_local";
    const STORAGE_LINKS_KEY = "media_flow_db_links_local";
    const STORAGE_DARK_KEY = "media_flow_db_dark_local";
    const STORAGE_VIEW_KEY = "media_flow_db_view_local";

    const navItems = [
      { label: "Overall", value: "overall" },
      { label: "Movies", value: "movie" },
      { label: "Series", value: "series" },
      { label: "Dramas", value: "drama" },
      { label: "Manhwa", value: "manhwa" },
      { label: "Anime", value: "anime" },
      { label: "Books", value: "book" },
      { label: "Cartoons", value: "cartoon" },
    ];

    const categoryLabel = {
      manhwa: "MANHWA",
      anime: "ANIME",
      series: "SERIES",
      drama: "DRAMA",
      movie: "MOVIE",
      book: "BOOK",
      cartoon: "CARTOON",
    };

    const fallbackCover = "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1200&q=80";

    const defaultSamples = [
      {
        _id: "sample-1",
        title: "Solo Leveling",
        category: "manhwa",
        coverImage: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=900&q=80",
        description: "In a world where hunters must battle deadly monsters to protect mankind, Sung Jinwoo, the weakest hunter of all mankind, finds himself in a struggle for survival.",
        genres: ["Action", "Fantasy", "Adventure"],
        rating: 9.3,
        recommended: true,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        progress: {
          currentChapter: 150,
          totalChapters: 179
        }
      },
      {
        _id: "sample-2",
        title: "Interstellar",
        category: "movie",
        coverImage: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=900&q=80",
        description: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
        genres: ["Sci-Fi", "Drama", "Space"],
        rating: 9.5,
        recommended: true,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        progress: {
          watched: false,
          watchPercentage: 85
        }
      },
      {
        _id: "sample-3",
        title: "Frieren: Beyond Journey's End",
        category: "anime",
        coverImage: "https://images.unsplash.com/photo-1578632767115-351597cf2477?auto=format&fit=crop&w=900&q=80",
        description: "An elf mage and her former party members' journey after completing their long quest.",
        genres: ["Fantasy", "Slice of Life", "Adventure"],
        rating: 9.7,
        recommended: true,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        progress: {
          currentEpisode: 16,
          totalEpisodes: 28,
          currentSeason: 1,
          totalSeasons: 1,
          seasons: [{ seasonNumber: 1, totalEpisodes: 28 }]
        }
      },
      {
        _id: "sample-4",
        title: "Atomic Habits",
        category: "book",
        coverImage: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=900&q=80",
        description: "Tiny Changes, Remarkable Results. An easy & proven way to build good habits and break bad ones.",
        genres: ["Self-Help", "Productivity"],
        rating: 8.8,
        recommended: false,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        progress: {
          currentPage: 215,
          totalPages: 320
        }
      }
    ];

    const defaultLinks = {
      "sample-1": { prequelIds: [], sequelIds: [] },
      "sample-2": { prequelIds: [], sequelIds: [] },
      "sample-3": { prequelIds: [], sequelIds: [] },
      "sample-4": { prequelIds: [], sequelIds: [] }
    };

    // State Variables
    let allMedia = [];
    let links = {};
    let activeCategory = "overall";
    let searchTerm = "";
    let viewMode = "carousel";
    let darkMode = false;
    let addOpen = false;
    let editingId = null;
    let selectedMedia = null;
    let statusText = "Ready";

    // Form Temporary State
    let formState = {
      title: "",
      category: "manhwa",
      coverImage: "",
      description: "",
      genres: "",
      rating: 8,
      currentChapter: 1,
      totalChapters: 100,
      currentEpisode: 1,
      currentSeason: 1,
      totalSeasons: 1,
      seasons: [{ seasonNumber: 1, totalEpisodes: 12 }],
      currentPage: 1,
      totalPages: 300,
      watched: false,
      watchPercentage: 0,
      prequelIds: [],
      sequelIds: []
    };

    // Initialize & LocalStorage Load
    function init() {
      // Load dark mode preference
      const savedDark = localStorage.getItem(STORAGE_DARK_KEY);
      if (savedDark) {
        darkMode = savedDark === "true";
      } else {
        darkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
      }
      applyTheme();

      // Load view mode
      viewMode = localStorage.getItem(STORAGE_VIEW_KEY) || "carousel";

      // Load items
      const savedItems = localStorage.getItem(STORAGE_ITEMS_KEY);
      if (savedItems) {
        try {
          allMedia = JSON.parse(savedItems);
        } catch (e) {
          allMedia = [...defaultSamples];
        }
      } else {
        allMedia = [...defaultSamples];
        saveItems();
      }

      // Load links
      const savedLinks = localStorage.getItem(STORAGE_LINKS_KEY);
      if (savedLinks) {
        try {
          links = JSON.parse(savedLinks);
        } catch (e) {
          links = { ...defaultLinks };
        }
      } else {
        links = { ...defaultLinks };
        saveLinks();
      }

      render();
    }

    function saveItems() {
      localStorage.setItem(STORAGE_ITEMS_KEY, JSON.stringify(allMedia));
    }

    function saveLinks() {
      localStorage.setItem(STORAGE_LINKS_KEY, JSON.stringify(links));
    }

    function applyTheme() {
      if (darkMode) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    }

    // Helper functions matching React code exactly
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function makeSeasons(count) {
      return Array.from({ length: Math.max(count, 1) }, (_, i) => ({
        seasonNumber: i + 1,
        totalEpisodes: 12,
      }));
    }

    function getSeasonEpisodes(progress, seasonNum) {
      const entry = (progress.seasons || []).find((s) => s.seasonNumber === seasonNum);
      return entry?.totalEpisodes ?? progress.totalEpisodes ?? 0;
    }

    function getTotalAllEpisodes(progress) {
      if (progress.seasons && progress.seasons.length > 0) {
        return progress.seasons.reduce((sum, s) => sum + s.totalEpisodes, 0);
      }
      return (progress.totalSeasons ?? 1) * (progress.totalEpisodes ?? 0);
    }

    function formatProgress(item) {
      const { progress } = item;
      if (item.category === "manhwa") {
        return `Chapter ${progress.currentChapter ?? 0} / ${progress.totalChapters ?? 0}`;
      }
      if (
        item.category === "anime" ||
        item.category === "cartoon" ||
        item.category === "series" ||
        item.category === "drama"
      ) {
        const seasonEps = getSeasonEpisodes(progress, progress.currentSeason ?? 1);
        return `Season ${progress.currentSeason ?? 1} - Episode ${progress.currentEpisode ?? 0} / ${seasonEps}`;
      }
      if (item.category === "book") {
        return `Page ${progress.currentPage ?? 0} / ${progress.totalPages ?? 0}`;
      }
      return progress.watched ? "Watched" : `Progress ${progress.watchPercentage ?? 0}%`;
    }

    function totalsSummary(item) {
      const p = item.progress;
      if (item.category === "manhwa") {
        return `Total Chapters: ${p.totalChapters ?? 0}`;
      }
      if (
        item.category === "anime" ||
        item.category === "cartoon" ||
        item.category === "series" ||
        item.category === "drama"
      ) {
        const total = getTotalAllEpisodes(p);
        return `Total Seasons: ${p.totalSeasons ?? 0} | Total Episodes: ${total}`;
      }
      if (item.category === "book") {
        return `Total Pages: ${p.totalPages ?? 0}`;
      }
      if (typeof p.watchPercentage === "number") {
        return `Total Watch Target: 100%`;
      }
      return "Total Status: 1 completed movie";
    }

    function getItemLinks(id) {
      const rel = links[id];
      if (!rel) return { prequelIds: [], sequelIds: [] };
      return {
        prequelIds: rel.prequelIds || [],
        sequelIds: rel.sequelIds || [],
      };
    }

    function hasLinks(id) {
      const { prequelIds, sequelIds } = getItemLinks(id);
      return prequelIds.length > 0 || sequelIds.length > 0;
    }

    // Interactive Action Triggers
    function setCategory(cat) {
      activeCategory = cat;
      render();
    }

    function toggleViewMode() {
      viewMode = viewMode === "carousel" ? "grid" : "carousel";
      localStorage.setItem(STORAGE_VIEW_KEY, viewMode);
      render();
    }

    function toggleDarkMode() {
      darkMode = !darkMode;
      localStorage.setItem(STORAGE_DARK_KEY, String(darkMode));
      applyTheme();
      render();
    }

    function searchChanged(e) {
      searchTerm = e.value;
      render();
    }

    function triggerAddOpen() {
      editingId = null;
      formState = {
        title: "",
        category: "manhwa",
        coverImage: "",
        description: "",
        genres: "",
        rating: 8,
        currentChapter: 1,
        totalChapters: 100,
        currentEpisode: 1,
        currentSeason: 1,
        totalSeasons: 1,
        seasons: makeSeasons(1),
        currentPage: 1,
        totalPages: 300,
        watched: false,
        watchPercentage: 0,
        prequelIds: [],
        sequelIds: []
      };
      addOpen = true;
      render();
    }

    function handleEdit(id) {
      const item = allMedia.find(m => m._id === id);
      if (!item) return;

      const rel = getItemLinks(id);
      const totalSeasons = item.progress.totalSeasons || 1;
      const existingSeasons = item.progress.seasons || [];
      const seasons = Array.from({ length: totalSeasons }, (_, i) => {
        const existing = existingSeasons.find((s) => s.seasonNumber === i + 1);
        return { seasonNumber: i + 1, totalEpisodes: existing?.totalEpisodes ?? item.progress.totalEpisodes ?? 12 };
      });

      editingId = id;
      formState = {
        title: item.title,
        category: item.category,
        coverImage: item.coverImage,
        description: item.description,
        genres: item.genres.join(", "),
        rating: item.rating,
        currentChapter: item.progress.currentChapter || 1,
        totalChapters: item.progress.totalChapters || 100,
        currentEpisode: item.progress.currentEpisode || 1,
        currentSeason: item.progress.currentSeason || 1,
        totalSeasons,
        seasons,
        currentPage: item.progress.currentPage || 1,
        totalPages: item.progress.totalPages || 300,
        watched: item.progress.watched || false,
        watchPercentage: item.progress.watchPercentage || 0,
        prequelIds: rel.prequelIds,
        sequelIds: rel.sequelIds
      };
      addOpen = true;
      render();
    }

    function handleShow(id) {
      const item = allMedia.find(m => m._id === id);
      if (item) {
        selectedMedia = item;
        render();
      }
    }

    function handleCloseDetails() {
      selectedMedia = null;
      render();
    }

    function handlePatchProgress(id, updates) {
      allMedia = allMedia.map((item) => {
        if (item._id === id) {
          const newProgress = { ...item.progress, ...updates };
          return { ...item, progress: newProgress, updatedAt: new Date().toISOString() };
        }
        return item;
      });
      saveItems();
      
      // Update details view if currently active
      if (selectedMedia && selectedMedia._id === id) {
        selectedMedia = allMedia.find(m => m._id === id);
      }
      
      statusText = `Updated progress locally for card ${id}`;
      render();
    }

    function handleFormChange(field, value) {
      formState[field] = value;
      render();
    }

    function handleCategoryChange(cat) {
      formState.category = cat;
      if (cat === "anime" || cat === "cartoon" || cat === "series" || cat === "drama") {
        if (!formState.seasons || formState.seasons.length === 0) {
          formState.seasons = makeSeasons(formState.totalSeasons);
        }
      }
      render();
    }

    function handleTotalSeasonsChange(newTotal) {
      const clamped = Math.max(newTotal, 1);
      const existing = formState.seasons || [];
      const seasons = Array.from({ length: clamped }, (_, i) => {
        if (i < existing.length) return existing[i];
        return { seasonNumber: i + 1, totalEpisodes: 12 };
      });
      formState.totalSeasons = clamped;
      formState.seasons = seasons;
      formState.currentSeason = clamp(formState.currentSeason, 1, clamped);
      render();
    }

    function handleSeasonEpisodeChange(index, value) {
      const updated = [...formState.seasons];
      updated[index] = { ...updated[index], totalEpisodes: Math.max(Number(value), 1) };
      formState.seasons = updated;
      render();
    }

    function handleAddRelation(field, value) {
      if (value && !formState[field].includes(value)) {
        formState[field] = [...formState[field], value];
        render();
      }
    }

    function handleRemoveRelation(field, id) {
      formState[field] = formState[field].filter(item => item !== id);
      render();
    }

    // Reset default DB function
    function resetToSamples() {
      if (confirm("Reset current cards to defaults? All custom cards will be lost.")) {
        allMedia = [...defaultSamples];
        links = { ...defaultLinks };
        saveItems();
        saveLinks();
        statusText = "Database reset to defaults successfully.";
        render();
      }
    }

    // Save Form Submission
    function handleFormSubmit(e) {
      e.preventDefault();
      if (!formState.title.trim()) return;

      const genresArray = formState.genres.split(",").map(g => g.trim()).filter(Boolean);
      const cover = formState.coverImage.trim() || fallbackCover;

      // Build progress exactly matching React logic
      let builtProgress = {};
      if (formState.category === "manhwa") {
        builtProgress = {
          currentChapter: clamp(formState.currentChapter, 0, formState.totalChapters),
          totalChapters: Math.max(formState.totalChapters, 1),
        };
      } else if (["anime", "cartoon", "series", "drama"].includes(formState.category)) {
        const totalSeasons = Math.max(formState.totalSeasons, 1);
        const seasons = formState.seasons.slice(0, totalSeasons).map((s, i) => ({
          seasonNumber: i + 1,
          totalEpisodes: Math.max(s.totalEpisodes, 1),
        }));
        const currentSeason = clamp(formState.currentSeason, 1, totalSeasons);
        const currentSeasonEps = seasons[currentSeason - 1]?.totalEpisodes ?? 12;
        const totalEpisodes = seasons.reduce((sum, s) => sum + s.totalEpisodes, 0);

        builtProgress = {
          currentEpisode: clamp(formState.currentEpisode, 0, currentSeasonEps),
          totalEpisodes,
          currentSeason,
          totalSeasons,
          seasons,
        };
      } else if (formState.category === "book") {
        builtProgress = {
          currentPage: clamp(formState.currentPage, 0, formState.totalPages),
          totalPages: Math.max(formState.totalPages, 1),
        };
      } else {
        builtProgress = {
          watched: formState.watched,
          watchPercentage: clamp(formState.watchPercentage, 0, 100),
        };
      }

      const payload = {
        title: formState.title.trim(),
        category: formState.category,
        coverImage: cover,
        description: formState.description.trim() || "No description yet.",
        genres: genresArray,
        rating: formState.rating,
        recommended: formState.rating >= 8.5,
        progress: builtProgress,
        updatedAt: new Date().toISOString()
      };

      if (editingId) {
        // Update item
        allMedia = allMedia.map(m => m._id === editingId ? { ...m, ...payload } : m);
        saveLinksState(editingId, formState.prequelIds, formState.sequelIds);
        statusText = `Updated media "${payload.title}"`;
      } else {
        // Create item
        const newId = `media-${Date.now()}`;
        const newItem = {
          _id: newId,
          ...payload,
          createdAt: new Date().toISOString()
        };
        allMedia = [newItem, ...allMedia];
        saveLinksState(newId, formState.prequelIds, formState.sequelIds);
        statusText = `Created media "${payload.title}"`;
      }

      saveItems();
      addOpen = false;
      editingId = null;
      render();
    }

    function saveLinksState(targetId, prequelIds, sequelIds) {
      const next = { ...links };
      const oldRel = links[targetId] || { prequelIds: [], sequelIds: [] };
      
      // Clean previous connections
      for (const pid of (oldRel.prequelIds || [])) {
        if (next[pid]) {
          next[pid] = { ...next[pid], sequelIds: (next[pid].sequelIds || []).filter((s) => s !== targetId) };
        }
      }
      for (const sid of (oldRel.sequelIds || [])) {
        if (next[sid]) {
          next[sid] = { ...next[sid], prequelIds: (next[sid].prequelIds || []).filter((p) => p !== targetId) };
        }
      }

      // Set new connections
      next[targetId] = { prequelIds, sequelIds };
      for (const pid of prequelIds) {
        const existing = next[pid] || { prequelIds: [], sequelIds: [] };
        const sequels = new Set(existing.sequelIds || []);
        sequels.add(targetId);
        next[pid] = { ...existing, sequelIds: [...sequels] };
      }
      for (const sid of sequelIds) {
        const existing = next[sid] || { prequelIds: [], sequelIds: [] };
        const prequels = new Set(existing.prequelIds || []);
        prequels.add(targetId);
        next[sid] = { ...existing, prequelIds: [...prequels] };
      }
      
      links = next;
      saveLinks();
    }

    function deleteCard(id) {
      if (!confirm("Are you sure you want to delete this media card?")) return;
      
      // Clean links
      const next = { ...links };
      delete next[id];
      Object.keys(next).forEach(key => {
        next[key] = {
          prequelIds: (next[key].prequelIds || []).filter(item => item !== id),
          sequelIds: (next[key].sequelIds || []).filter(item => item !== id)
        };
      });
      links = next;
      saveLinks();

      allMedia = allMedia.filter(m => m._id !== id);
      saveItems();
      
      addOpen = false;
      editingId = null;
      statusText = "Deleted media card";
      render();
    }

    // Scroll trigger helper for carousels
    function scrollCarousel(id, offset) {
      const el = document.getElementById(id);
      if (el) {
        el.scrollBy({ left: offset, behavior: "smooth" });
      }
    }

    // Core Dynamic HTML Renderer
    function render() {
      const app = document.getElementById("app");
      const normalizedSearch = searchTerm.trim().toLowerCase();

      // Filtered Media for lists
      let currentFiltered = allMedia;
      if (activeCategory !== "overall") {
        currentFiltered = currentFiltered.filter(item => item.category === activeCategory);
      }
      if (normalizedSearch) {
        currentFiltered = currentFiltered.filter(item => 
          `${item.title} ${item.description} ${item.genres.join(" ")}`.toLowerCase().includes(normalizedSearch)
        );
      }

      // Recreate sections exactly matching React `useMemo`
      const sections = {
        recentlyUpdated: [...currentFiltered].sort((a, b) => new Date(b.updatedAt).getTime() - new Date(a.updatedAt).getTime()).slice(0, 6),
        recommendations: currentFiltered.filter(item => item.rating >= 8.5).slice(0, 6),
        random: [...currentFiltered].sort(() => 0.5 - Math.random()).slice(0, 6)
      };

      const mediaOptions = allMedia.map(item => ({ id: item._id, title: item.title }));

      // Render App shell
      app.innerHTML = `
        <div class="min-h-screen">
          <!-- Header block with Navigation bar -->
          <header class="sticky top-0 z-20 border-b backdrop-blur border-slate-200 bg-white/95 dark:border-slate-800 dark:bg-slate-950/95 transition-colors">
            <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-6 py-4">
              <div>
                <p class="text-xs font-semibold uppercase tracking-[0.2em] text-indigo-600">Media Tracker</p>
                <h1 class="text-xl font-bold">Media Flow DB</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400">Offline Single-File Edition • Store: localStorage</p>
              </div>
              <div class="flex flex-wrap items-center justify-end gap-2">
                <button onclick="toggleViewMode()" class="rounded-full border px-4 py-2 text-sm font-medium transition border-slate-300 bg-white text-slate-700 hover:border-slate-400 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:hover:border-slate-600">
                  ${viewMode === "carousel" ? "Grid View" : "Carousel View"}
                </button>
                <button onclick="toggleDarkMode()" class="rounded-full border px-4 py-2 text-sm font-medium transition border-slate-300 bg-white text-slate-700 hover:border-slate-400 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:hover:border-slate-600">
                  ${darkMode ? "Light Mode" : "Dark Mode"}
                </button>
                <button onclick="triggerAddOpen()" class="rounded-full bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-500">+ Add Card</button>
                <button onclick="resetToSamples()" class="rounded-full border px-4 py-2 text-sm font-medium transition border-rose-200 bg-rose-50 text-rose-700 hover:border-rose-400 dark:border-rose-900 dark:bg-rose-950/20 dark:text-rose-400">Reset Defaults</button>
              </div>
            </div>
            
            <nav class="no-scrollbar mx-auto flex w-full max-w-7xl gap-2 overflow-x-auto px-6 pb-4">
              ${navItems.map(item => `
                <button onclick="setCategory('${item.value}')" class="rounded-full px-4 py-2 text-sm font-medium transition ${
                  activeCategory === item.value 
                    ? 'bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-900' 
                    : 'bg-slate-100 text-slate-600 hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700'
                }">
                  ${item.label}
                </button>
              `).join("")}
            </nav>
          </header>

          <!-- Main workspace -->
          <main class="fade-in-up mx-auto flex w-full max-w-7xl flex-col gap-8 px-6 py-8">
            <section class="space-y-2">
              <h2 class="text-3xl font-semibold capitalize">${navItems.find(item => item.value === activeCategory)?.label ?? "Overall"}</h2>
              <p class="max-w-3xl text-sm text-slate-600 dark:text-slate-300">Your personal media collection. Each category tracks its own custom progress counters, sequels, and prequel graphs offline.</p>
              <div>
                <input 
                  type="text" 
                  value="${searchTerm}" 
                  oninput="searchChanged(this)" 
                  placeholder="Search title, description, genres..."
                  class="w-full max-w-xl rounded-xl border px-3 py-2 text-sm outline-none transition focus:border-indigo-500 border-slate-300 bg-white text-slate-900 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:placeholder-slate-500" 
                />
              </div>
              <p class="text-xs text-slate-500 dark:text-slate-400">System Log: ${statusText}</p>
            </section>

            <!-- Render lists based on selected view mode -->
            ${viewMode === "carousel" ? `
              <!-- Carousel Layout -->
              <div class="space-y-10">
                ${renderCarouselSection("Recently Updated", sections.recentlyUpdated, "carousel-recent")}
                ${renderCarouselSection("Recommendations", sections.recommendations, "carousel-recom")}
                ${renderCarouselSection("Random", sections.random, "carousel-random")}
              </div>
            ` : `
              <!-- Grid Layout -->
              ${renderGridLayout(currentFiltered)}
            `}
          </main>

          <!-- Sidebar Drawer (Add / Edit) -->
          ${renderSidebarDrawer(mediaOptions)}

          <!-- Detailed View Overlay Modal -->
          ${renderDetailsModal()}
        </div>
      `;
    }

    // Carousel Layout Builder matching exact classes
    function renderCarouselSection(title, itemsList, elementId) {
      return `
        <section class="space-y-3">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold text-slate-900 dark:text-slate-100">${title}</h2>
            <div class="flex gap-2">
              <button onclick="scrollCarousel('${elementId}', -360)" class="carousel-nav border-slate-300 bg-white text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700">Prev</button>
              <button onclick="scrollCarousel('${elementId}', 360)" class="carousel-nav border-slate-300 bg-white text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700">Next</button>
            </div>
          </div>
          <div id="${elementId}" class="no-scrollbar flex snap-x snap-mandatory gap-4 overflow-x-auto pb-2">
            ${itemsList.map(item => `
              <div class="fade-in-up min-w-80 snap-start">
                ${renderMediaCardMarkup(item)}
              </div>
            `).join("")}
            ${itemsList.length === 0 ? `<p class="p-2 text-sm text-slate-500 dark:text-slate-400">No items for this section yet.</p>` : ""}
          </div>
        </section>
      `;
    }

    // Grid Layout Builder
    function renderGridLayout(itemsList) {
      return `
        <section class="space-y-3">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-slate-100">All Results</h2>
          ${itemsList.length === 0 ? `
            <p class="text-sm text-slate-500 dark:text-slate-400">No matching media.</p>
          ` : `
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
              ${itemsList.map(item => renderMediaCardMarkup(item)).join("")}
            </div>
          `}
        </section>
      `;
    }

    // Replicates MediaCard markup with standard Tailwind styling classes
    function renderMediaCardMarkup(item) {
      const isDarkClass = darkMode ? "border-slate-700 bg-slate-900" : "border-slate-200 bg-white";
      const badgeClass = darkMode ? "bg-slate-800 text-slate-200" : "bg-slate-100 text-slate-700";

      return `
        <article class="overflow-hidden rounded-2xl border shadow-sm transition duration-300 ${isDarkClass}">
          <img src="${item.coverImage}" alt="${item.title}" class="h-60 w-full object-cover" onerror="this.src='${fallbackCover}'" />
          <div class="space-y-3 p-4">
            <div class="flex items-center justify-between gap-3">
              <h3 class="line-clamp-1 text-base font-semibold text-slate-900 dark:text-slate-100">${item.title}</h3>
              <span class="rounded-full px-2 py-1 text-[10px] font-semibold tracking-wide ${badgeClass}">
                ${categoryLabel[item.category]}
              </span>
            </div>
            <p class="line-clamp-2 text-sm text-slate-600 dark:text-slate-300">${item.description || "No description provided."}</p>
            <p class="text-sm font-medium text-slate-900 dark:text-slate-100">${formatProgress(item)}</p>
            <p class="text-xs text-slate-500 dark:text-slate-400">${totalsSummary(item)}</p>
            
            <!-- Dynamic progress buttons matching component -->
            ${renderProgressButtonsMarkup(item)}
          </div>
          <div class="space-y-3 p-4">
            <div class="flex gap-2 pt-2">
              <button onclick="handleEdit('${item._id}')" class="rounded-full bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-500">Edit</button>
              <button onclick="handleShow('${item._id}')" class="rounded-full px-4 py-2 text-sm font-semibold text-white transition bg-slate-700 hover:bg-slate-500 dark:bg-slate-800 dark:hover:bg-slate-700">Show All</button>
            </div>
          </div>
        </article>
      `;
    }

    // Dynamic Progressive Buttons Markup
    function renderProgressButtonsMarkup(item) {
      const p = item.progress;
      const btnClass = "progress-btn flex items-center justify-center border text-center transition-all " + 
        (darkMode ? "border-slate-600 bg-slate-800 text-slate-100 hover:bg-slate-700" : "border-slate-300 bg-slate-100 text-slate-800 hover:bg-slate-200");

      if (item.category === "manhwa") {
        const current = p.currentChapter ?? 0;
        const total = p.totalChapters ?? 0;
        return `
          <div class="flex items-center gap-2 text-sm">
            <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentChapter: clamp(${current - 1}, 0, ${total}) })">-</button>
            <span class="min-w-20 text-center">${current}</span>
            <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentChapter: clamp(${current + 1}, 0, ${total}) })">+</button>
          </div>
        `;
      }

      if (["anime", "cartoon", "series", "drama"].includes(item.category)) {
        const episode = p.currentEpisode ?? 0;
        const season = p.currentSeason ?? 1;
        const totalSeasons = p.totalSeasons ?? 1;
        const seasonEps = getSeasonEpisodes(p, season);

        return `
          <div class="space-y-2 text-sm">
            <div class="flex items-center gap-2">
              <span class="w-16 text-slate-500 dark:text-slate-400">Episode</span>
              <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentEpisode: clamp(${episode - 1}, 0, ${seasonEps}) })">-</button>
              <span class="min-w-20 text-center">${episode} / ${seasonEps}</span>
              <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentEpisode: clamp(${episode + 1}, 0, ${seasonEps}) })">+</button>
            </div>
            <div class="flex items-center gap-2">
              <span class="w-16 text-slate-500 dark:text-slate-400">Season</span>
              <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentSeason: clamp(${season - 1}, 1, ${totalSeasons}), currentEpisode: 0 })">-</button>
              <span class="min-w-20 text-center">${season} / ${totalSeasons}</span>
              <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentSeason: clamp(${season + 1}, 1, ${totalSeasons}), currentEpisode: 0 })">+</button>
            </div>
          </div>
        `;
      }

      if (item.category === "book") {
        const page = p.currentPage ?? 0;
        const total = p.totalPages ?? 0;
        return `
          <div class="flex items-center gap-2 text-sm">
            <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentPage: clamp(${page - 1}, 0, ${total}) })">-</button>
            <span class="min-w-20 text-center">${page}</span>
            <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { currentPage: clamp(${page + 1}, 0, ${total}) })">+</button>
          </div>
        `;
      }

      // Default watch targets (Movies / other categories)
      const watched = p.watched ?? false;
      const percentage = p.watchPercentage ?? 0;
      const watchStateClass = watched 
        ? "border-emerald-600 bg-emerald-600 text-white" 
        : (darkMode ? "border-slate-600 text-slate-200 hover:border-slate-500" : "border-slate-300 text-slate-700 hover:border-slate-400");

      return `
        <div class="flex flex-wrap items-center gap-2 text-sm">
          <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { watchPercentage: clamp(${percentage - 5}, 0, 100), watched: false })">-5%</button>
          <span class="min-w-16 text-center">${percentage}%</span>
          <button class="${btnClass}" onclick="handlePatchProgress('${item._id}', { watchPercentage: clamp(${percentage + 5}, 0, 100), watched: ${percentage + 5 >= 100} })">+5%</button>
          <button
            onclick="handlePatchProgress('${item._id}', { watched: ${!watched}, watchPercentage: ${!watched ? 100 : percentage} })"
            class="rounded-full border px-3 py-1 text-xs font-medium transition ${watchStateClass}"
          >
            ${watched ? "Watched" : "Mark Watched"}
          </button>
        </div>
      `;
    }

    // Sidebar drawer build layout matches React design perfectly
    function renderSidebarDrawer(mediaOptions) {
      if (!addOpen) return "";

      const inputClass = "w-full rounded-xl border px-3 py-2 text-sm " + (darkMode ? "border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-500" : "border-slate-300 bg-white");
      const hasSeasons = ["anime", "cartoon", "series", "drama"].includes(formState.category);

      return `
        <div class="fixed inset-0 z-30 transition pointer-events-auto">
          <!-- Backing Overlay -->
          <div onclick="addOpen = false; editingId = null; render()" class="absolute inset-0 bg-slate-900/40 dark:bg-slate-950/60 transition-opacity"></div>
          
          <aside class="absolute right-0 top-0 h-full w-full max-w-md overflow-y-auto p-6 shadow-xl transition-transform duration-300 ${
            darkMode ? "bg-slate-900 text-slate-100" : "bg-white text-slate-900"
          }">
            <div class="mb-6 flex items-center justify-between">
              <h3 class="text-xl font-semibold">${editingId ? "Edit Media" : "Add Card"}</h3>
              <div class="flex gap-2">
                ${editingId ? `
                  <button onclick="deleteCard('${editingId}')" class="rounded-full bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-500">Delete</button>
                ` : ""}
                <button onclick="addOpen = false; editingId = null; render()" class="rounded-full bg-red-800 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700">Close</button>
              </div>
            </div>

            <form class="space-y-4" onsubmit="handleFormSubmit(event)">
              <!-- Category dropdown -->
              <label class="block space-y-1 text-sm">
                <span>Category</span>
                <select onchange="handleCategoryChange(this.value)" class="${inputClass}">
                  <option value="movie" ${formState.category === "movie" ? "selected" : ""}>Movies</option>
                  <option value="series" ${formState.category === "series" ? "selected" : ""}>Series</option>
                  <option value="drama" ${formState.category === "drama" ? "selected" : ""}>Dramas</option>
                  <option value="manhwa" ${formState.category === "manhwa" ? "selected" : ""}>Manhwa</option>
                  <option value="anime" ${formState.category === "anime" ? "selected" : ""}>Anime</option>
                  <option value="book" ${formState.category === "book" ? "selected" : ""}>Books</option>
                  <option value="cartoon" ${formState.category === "cartoon" ? "selected" : ""}>Cartoons</option>
                </select>
              </label>

              <!-- Standard info fields -->
              <label class="block space-y-1 text-sm">
                <span>Title</span>
                <input required type="text" value="${formState.title}" oninput="handleFormChange('title', this.value)" class="${inputClass}" />
              </label>

              <label class="block space-y-1 text-sm">
                <span>Cover Image URL</span>
                <input type="text" value="${formState.coverImage}" placeholder="https://..." oninput="handleFormChange('coverImage', this.value)" class="${inputClass}" />
              </label>

              <label class="block space-y-1 text-sm">
                <span>Description</span>
                <textarea oninput="handleFormChange('description', this.value)" class="${inputClass} min-h-24">${formState.description}</textarea>
              </label>

              <label class="block space-y-1 text-sm">
                <span>Genres (comma separated)</span>
                <input type="text" value="${formState.genres}" oninput="handleFormChange('genres', this.value)" class="${inputClass}" />
              </label>

              <label class="block space-y-1 text-sm">
                <span>Rating</span>
                <input type="number" min="0" max="10" step="0.1" value="${formState.rating}" oninput="handleFormChange('rating', Number(this.value))" class="${inputClass}" />
              </label>

              <!-- Conditional fields EXACTLY matching original categories -->
              ${formState.category === "manhwa" ? `
                <label class="block space-y-1 text-sm">
                  <span>Current Chapter</span>
                  <input type="number" min="0" value="${formState.currentChapter}" oninput="handleFormChange('currentChapter', Number(this.value))" class="${inputClass}" />
                </label>
                <label class="block space-y-1 text-sm">
                  <span>Total Chapters</span>
                  <input type="number" min="1" value="${formState.totalChapters}" oninput="handleFormChange('totalChapters', Number(this.value))" class="${inputClass}" />
                </label>
              ` : ""}

              ${hasSeasons ? `
                <label class="block space-y-1 text-sm">
                  <span>Current Episode</span>
                  <input type="number" min="0" value="${formState.currentEpisode}" oninput="handleFormChange('currentEpisode', Number(this.value))" class="${inputClass}" />
                </label>
                <label class="block space-y-1 text-sm">
                  <span>Current Season</span>
                  <input type="number" min="1" max="${formState.totalSeasons}" value="${formState.currentSeason}" oninput="handleFormChange('currentSeason', clamp(Number(this.value), 1, formState.totalSeasons))" class="${inputClass}" />
                </label>
                <label class="block space-y-1 text-sm">
                  <span>Total Seasons</span>
                  <input type="number" min="1" value="${formState.totalSeasons}" oninput="handleTotalSeasonsChange(Number(this.value))" class="${inputClass}" />
                </label>
                
                <!-- Dynamic Episode Count Per Season Editor list -->
                <div class="space-y-2">
                  <span class="text-sm font-medium">Episodes Per Season</span>
                  ${(formState.seasons || []).map((s, idx) => `
                    <div class="flex items-center gap-2">
                      <span class="w-20 shrink-0 text-xs font-medium text-slate-500 dark:text-slate-400">Season ${s.seasonNumber}</span>
                      <input
                        type="number" 
                        min="1" 
                        value="${s.totalEpisodes}" 
                        oninput="handleSeasonEpisodeChange(${idx}, this.value)"
                        class="${inputClass}" 
                      />
                      <span class="text-xs text-slate-400">eps</span>
                    </div>
                  `).join("")}
                </div>
              ` : ""}

              ${formState.category === "book" ? `
                <label class="block space-y-1 text-sm">
                  <span>Current Page</span>
                  <input type="number" min="0" value="${formState.currentPage}" oninput="handleFormChange('currentPage', Number(this.value))" class="${inputClass}" />
                </label>
                <label class="block space-y-1 text-sm">
                  <span>Total Pages</span>
                  <input type="number" min="1" value="${formState.totalPages}" oninput="handleFormChange('totalPages', Number(this.value))" class="${inputClass}" />
                </label>
              ` : ""}

              ${formState.category === "movie" ? `
                <label class="block space-y-1 text-sm">
                  <span>Watch Percentage</span>
                  <input type="number" min="0" max="100" value="${formState.watchPercentage}" oninput="handleFormChange('watchPercentage', Number(this.value))" class="${inputClass}" />
                </label>
                <label class="flex items-center gap-2 text-sm">
                  <input type="checkbox" ${formState.watched ? "checked" : ""} onchange="handleFormChange('watched', this.checked)" class="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4" />
                  <span>Watched</span>
                </label>
              ` : ""}

              <!-- Relational connections dropdowns matching MultiSelect layout -->
              <div class="space-y-3 pt-3 border-t border-slate-200 dark:border-slate-800">
                <span class="text-sm font-semibold">Wiki Graph Links</span>
                
                <!-- Prequels -->
                <div class="space-y-2 text-sm">
                  <span>Prequels</span>
                  <div class="flex gap-2">
                    <select onchange="handleAddRelation('prequelIds', this.value); this.value='';" class="${inputClass}">
                      <option value="">Select...</option>
                      ${mediaOptions.filter(o => o.id !== editingId && !formState.sequelIds.includes(o.id) && !formState.prequelIds.includes(o.id)).map(opt => `
                        <option value="${opt.id}">${opt.title}</option>
                      `).join("")}
                    </select>
                  </div>
                  <div class="flex flex-wrap gap-2 pt-1">
                    ${formState.prequelIds.map(id => {
                      const m = allMedia.find(item => item._id === id);
                      return `
                        <span class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200">
                          ${m ? m.title : id}
                          <button type="button" onclick="handleRemoveRelation('prequelIds', '${id}')" class="ml-1 text-xs font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white">×</button>
                        </span>
                      `;
                    }).join("")}
                  </div>
                </div>

                <!-- Sequels -->
                <div class="space-y-2 text-sm">
                  <span>Sequels</span>
                  <div class="flex gap-2">
                    <select onchange="handleAddRelation('sequelIds', this.value); this.value='';" class="${inputClass}">
                      <option value="">Select...</option>
                      ${mediaOptions.filter(o => o.id !== editingId && !formState.prequelIds.includes(o.id) && !formState.sequelIds.includes(o.id)).map(opt => `
                        <option value="${opt.id}">${opt.title}</option>
                      `).join("")}
                    </select>
                  </div>
                  <div class="flex flex-wrap gap-2 pt-1">
                    ${formState.sequelIds.map(id => {
                      const m = allMedia.find(item => item._id === id);
                      return `
                        <span class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200">
                          ${m ? m.title : id}
                          <button type="button" onclick="handleRemoveRelation('sequelIds', '${id}')" class="ml-1 text-xs font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white">×</button>
                        </span>
                      `;
                    }).join("")}
                  </div>
                </div>
              </div>

              <button type="submit" class="w-full rounded-xl px-4 py-3 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-500 shadow-md">
                ${editingId ? "Update Media" : "Save"}
              </button>
            </form>
          </aside>
        </div>
      `;
    }

    // Modal Details Box matching React component template classes perfectly
    function renderDetailsModal() {
      if (!selectedMedia) return "";

      const p = selectedMedia.progress;
      const isDarkClass = darkMode ? "bg-slate-900 text-slate-100" : "bg-white text-slate-900";
      const isBlockClass = darkMode ? "bg-slate-800 text-slate-300" : "bg-slate-100 text-slate-600";

      const mediaByIdMap = {};
      allMedia.forEach(item => {
        mediaByIdMap[item._id] = item;
      });

      const rel = getItemLinks(selectedMedia._id);
      const prequels = rel.prequelIds.map(id => mediaByIdMap[id]).filter(Boolean);
      const sequels = rel.sequelIds.map(id => mediaByIdMap[id]).filter(Boolean);

      const hasSeasons = ["anime", "cartoon", "series", "drama"].includes(selectedMedia.category);

      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
          <div class="max-h-[90vh] w-full max-w-3xl overflow-y-auto rounded-2xl p-6 shadow-2xl ${isDarkClass}">
            <img src="${selectedMedia.coverImage}" alt="${selectedMedia.title}" class="mb-4 max-h-96 w-full rounded-xl object-contain bg-slate-100 dark:bg-slate-950" onerror="this.src='${fallbackCover}'" />
            <h2 class="mb-4 text-3xl font-bold text-slate-900 dark:text-slate-100">${selectedMedia.title}</h2>

            <div class="space-y-2">
              <p class="rounded-lg px-4 py-2 ${isBlockClass}">
                <span class="font-semibold text-slate-700 dark:text-slate-200">Progress:</span> ${formatProgress(selectedMedia)}
              </p>
              <p class="rounded-lg px-4 py-2 ${isBlockClass}">
                <span class="font-semibold text-slate-700 dark:text-slate-200">Totals:</span> ${totalsSummary(selectedMedia)}
              </p>
              <p class="rounded-lg px-4 py-2 ${isBlockClass}">
                <span class="font-semibold text-slate-700 dark:text-slate-200">Category:</span> ${categoryLabel[selectedMedia.category]}
              </p>
              <p class="rounded-lg px-4 py-2 ${isBlockClass}">
                <span class="font-semibold text-slate-700 dark:text-slate-200">Rating:</span> <span class="font-bold text-yellow-500">⭐ ${selectedMedia.rating}</span>
              </p>
              <p class="rounded-lg px-4 py-2 ${isBlockClass}">
                <span class="font-semibold text-slate-700 dark:text-slate-200">Genres:</span> ${selectedMedia.genres.join(", ") || "None"}
              </p>
            </div>

            <!-- Dynamic Season Breakdown -->
            ${hasSeasons && p.seasons && p.seasons.length > 0 ? `
              <div class="mt-4 space-y-2 rounded-xl border p-4 ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-200 bg-slate-50'}">
                <h3 class="text-sm font-semibold text-slate-700 dark:text-slate-200">Season Breakdown</h3>
                <div class="space-y-1">
                  ${p.seasons.map(s => `
                    <div class="flex items-center justify-between rounded-lg px-3 py-1.5 text-xs ${darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}">
                      <span class="font-medium">Season ${s.seasonNumber}</span>
                      <span>${s.totalEpisodes} episodes</span>
                    </div>
                  `).join("")}
                </div>
              </div>
            ` : ""}

            <p class="mt-4 rounded-xl border p-4 leading-relaxed ${darkMode ? 'border-slate-700 bg-slate-800 text-slate-300' : 'border-slate-200 bg-slate-50 text-slate-700'}">
              ${selectedMedia.description || "No description yet."}
            </p>

            <!-- Linked prequels and sequels map with quick focused links -->
            ${hasLinks(selectedMedia._id) ? `
              <div class="mt-6 space-y-4 rounded-xl border p-4 ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-200 bg-slate-50'}">
                <h3 class="text-base font-semibold text-slate-900 dark:text-slate-100">Linked Media</h3>
                
                <!-- Prequels connection block -->
                ${prequels.length > 0 ? `
                  <div class="space-y-2">
                    <h4 class="text-sm font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Prequels (${prequels.length})</h4>
                    <div class="space-y-2">
                      ${prequels.map(item => `
                        <div class="flex items-center justify-between gap-3 rounded-xl border p-3 ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-200 bg-slate-50'}">

                          </button>

                      `).join("")}
                    </div>
                  </div>
                ` : ""}

                <!-- Sequels connection block -->
                ${sequels.length > 0 ? `
                  <div class="space-y-2">
                    <h4 class="text-sm font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Sequels (${sequels.length})</h4>
                    <div class="space-y-2">
                      ${sequels.map(item => `
                        <div class="flex items-center justify-between gap-3 rounded-xl border p-3 ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-200 bg-slate-50'}">
                          <div class="flex items-center gap-3 overflow-hidden">
                            <img src="${item.coverImage}" alt="${item.title}" class="h-12 w-12 shrink-0 rounded-lg object-cover" onerror="this.src='${fallbackCover}'" />
                            <div class="min-w-0">
                              <p class="truncate text-sm font-semibold text-slate-900 dark:text-slate-100">${item.title}</p>
                              <p class="text-xs text-slate-500 dark:text-slate-400">${categoryLabel[item.category]}</p>
                            </div>
                          </div>
                          <button onclick="handleShow('${item._id}')" class="shrink-0 rounded-full px-3 py-1.5 text-xs font-semibold text-white transition bg-slate-700 hover:bg-slate-500 dark:bg-slate-600 dark:hover:bg-slate-500">
                            Show All
                          </button>
                        </div>
                      `).join("")}

                  </div>
                ` : ""}

            ` : ""}

            <button onclick="handleCloseDetails()" class="mt-6 rounded-full bg-red-800 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700">Close</button>
          </div>
        </div>
      `;
    }

    // Bootstrap app
    init();
  </script>

  <!-- Firebase Cloud Sync Addon – makes cards accessible anywhere -->
  <script>
  // ================= FIREBASE CLOUD SYNC (GitHub Pages compatible) =================
  // 1) Create a Firebase project: https://console.firebase.google.com
  // 2) Enable Firestore + Anonymous Auth
  // 3) Paste your config below, OR set window.MEDIA_FLOW_FIREBASE_CONFIG before this script loads.
  // 4) Deploy index.html to GitHub Pages – cards will sync to Firestore cloud in real-time.
  //
  // If no Firebase config is provided, the app continues using localStorage (offline mode).
  //
   const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCruSH9ICuKSnT_sYDqK5wmop68XVfJFmU",
  authDomain: "media-tracker-9c96d.firebaseapp.com",
  projectId: "media-tracker-9c96d",
  storageBucket: "media-tracker-9c96d.firebasestorage.app",
  messagingSenderId: "939264721067",
  appId: "1:939264721067:web:b6178fd243caee4c5bb7ee"
};


  const GITHUB_GIST_TOKEN_KEY = "media_flow_gist_token";
  const GITHUB_GIST_ID_KEY = "media_flow_gist_id";

  let fbApp = null;
  let fbDb = null;
  let fbAuth = null;
  let cloudEnabled = false;
  let cloudUnsub = null;

  (async function initCloudSync(){
    try {
      if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) {
        console.log("Media Flow: Firebase not configured – running in localStorage offline mode. Add your Firebase config to enable cloud sync.");
        return;
      }
      if (typeof firebase === "undefined") {
        console.warn("Firebase SDK not loaded");
        return;
      }
      fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
      fbDb = firebase.firestore();
      fbAuth = firebase.auth();
      await fbAuth.signInAnonymously().catch(()=>{});
      cloudEnabled = true;

      // Show cloud badge
      const badgeHost = document.querySelector("header .flex.items-center.gap-2");
      if (badgeHost && !document.getElementById("cloudLiveBadge")) {
        const span = document.createElement("span");
        span.id = "cloudLiveBadge";
        span.className = "ml-2 inline-flex items-center gap-1 rounded-full bg-emerald-500/10 px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider text-emerald-600 border border-emerald-500/20";
        span.innerHTML = '<span style="width:6px;height:6px;border-radius:9999px;background:#10b981;display:inline-block;animation:pulse 1.2s infinite"></span> Cloud Live';
        badgeHost.appendChild(span);
      }

      // Real-time listener – global shared collection "media_items"
      cloudUnsub = fbDb.collection("media_items").orderBy("updatedAt", "desc").limit(200)
        .onSnapshot((snap) => {
          const cloudItems = [];
          snap.forEach(docSnap => {
            const d = docSnap.data();
            cloudItems.push({
              _id: docSnap.id,
              title: d.title,
              category: d.category,
              coverImage: d.coverImage,
              description: d.description || "",
              genres: d.genres || [],
              rating: d.rating || 0,
              recommended: d.recommended || false,
              createdAt: d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toISOString() : new Date().toISOString(),
              updatedAt: d.updatedAt && d.updatedAt.toDate ? d.updatedAt.toDate().toISOString() : new Date().toISOString(),
              progress: d.progress || {}
            });
          });
          if (cloudItems.length > 0) {
            // merge cloud items into local state
            if (typeof allMedia !== "undefined") {
              allMedia = cloudItems;
              try { localStorage.setItem("media_flow_db_items_local", JSON.stringify(allMedia)); } catch(e){}
              if (typeof render === "function") render();
            }
          }
        }, err => {
          console.warn("Firestore listener failed:", err);
        });

      console.log("✅ Media Flow: Firebase Cloud Sync ACTIVE – cards saved to Firestore and accessible anywhere.");
    } catch (e) {
      console.warn("Cloud sync init failed:", e);
    }
  })();

  // ---- Monkey-patch core data functions to mirror to Firestore ----
  (function patchCloudWriters(){
    const wait = () => new Promise(r => {
      const t = setInterval(()=> {
        if (typeof handlePatchProgress === "function" && typeof handleFormSubmit === "function") { clearInterval(t); r(true); }
      }, 120);
      setTimeout(()=>{ clearInterval(t); r(false); }, 4000);
    });

    wait().then(ok => {
      if (!ok) return;

      // Wrap handlePatchProgress
      const _origPatch = window.handlePatchProgress;
      if (typeof _origPatch === "function") {
        window.handlePatchProgress = function(id, updates) {
          const ret = _origPatch.apply(this, arguments);
          // Firestore mirror
          if (cloudEnabled && fbDb) {
            fbDb.collection("media_items").doc(id).update({
              progress: firebase.firestore.FieldValue.delete ? undefined : updates, // fallback handled below
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(()=>{});
            // smarter merge – read then update
            fbDb.collection("media_items").doc(id).get().then(snap => {
              if (snap.exists) {
                const current = snap.data().progress || {};
                return fbDb.collection("media_items").doc(id).update({
                  progress: { ...current, ...updates },
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
              }
            }).catch(()=>{});
          }
          // Also push to GitHub Gist if configured
          tryPushGistBackup();
          return ret;
        };
      }

      // Wrap handleFormSubmit
      const _origSave = window.handleFormSubmit;
      if (typeof _origSave === "function") {
        window.handleFormSubmit = async function(e) {
          // Let original run first to update local state
          const maybePromise = _origSave.apply(this, arguments);
          if (maybePromise && maybePromise.then) { try { await maybePromise; } catch(_){} }

          // Push full collection to Firestore (upsert)
          if (cloudEnabled && fbDb && typeof allMedia !== "undefined") {
            try {
              const batch = fbDb.batch();
              allMedia.slice(0, 50).forEach(item => {
                const ref = fbDb.collection("media_items").doc(item._id);
                batch.set(ref, {
                  title: item.title,
                  category: item.category,
                  coverImage: item.coverImage,
                  description: item.description || "",
                  genres: item.genres || [],
                  rating: item.rating || 0,
                  recommended: item.recommended || false,
                  progress: item.progress || {},
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  owner: "global"
                }, { merge: true });
              });
              await batch.commit();
            } catch(err) {
              console.warn("Firestore batch save failed:", err);
            }
          }
          tryPushGistBackup();
          return maybePromise;
        };
      }

      // expose cloud helpers globally
      window.mediaFlowCloud = {
        isEnabled: () => cloudEnabled,
        pushNow: pushFullToCloud,
        pullNow: pullFromCloud,
        pushGist: pushToGist,
        pullGist: pullFromGist
      };
    });
  })();

  // ---------- Firestore helpers ----------
  async function pushFullToCloud() {
    if (!cloudEnabled || !fbDb || typeof allMedia === "undefined") {
      alert("Cloud sync is not configured. Add your Firebase config at the top of index.html (FIREBASE_CONFIG).");
      return false;
    }
    try {
      const batch = fbDb.batch();
      allMedia.forEach(item => {
        const ref = fbDb.collection("media_items").doc(item._id);
        batch.set(ref, {
          title: item.title,
          category: item.category,
          coverImage: item.coverImage,
          description: item.description,
          genres: item.genres,
          rating: item.rating,
          recommended: item.recommended,
          progress: item.progress,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      });
      await batch.commit();
      alert("✅ Synced " + allMedia.length + " cards to Firebase Cloud!");
      return true;
    } catch (e) {
      alert("Cloud push failed: " + e.message);
      return false;
    }
  }

  async function pullFromCloud() {
    if (!cloudEnabled || !fbDb) {
      alert("Cloud sync is not configured.");
      return;
    }
    try {
      const snap = await fbDb.collection("media_items").orderBy("updatedAt", "desc").limit(200).get();
      const items = [];
      snap.forEach(d => {
        const v = d.data();
        items.push({
          _id: d.id,
          title: v.title,
          category: v.category,
          coverImage: v.coverImage,
          description: v.description,
          genres: v.genres || [],
          rating: v.rating || 0,
          recommended: v.recommended || false,
          createdAt: v.createdAt?.toDate ? v.createdAt.toDate().toISOString() : new Date().toISOString(),
          updatedAt: v.updatedAt?.toDate ? v.updatedAt.toDate().toISOString() : new Date().toISOString(),
          progress: v.progress || {}
        });
      });
      if (items.length) {
        allMedia = items;
        localStorage.setItem("media_flow_db_items_local", JSON.stringify(allMedia));
        if (typeof render === "function") render();
        alert("☁️ Pulled " + items.length + " cards from Firebase Cloud!");
      } else {
        alert("Cloud database is empty – push your local cards first.");
      }
    } catch (e) {
      alert("Cloud pull failed: " + e.message);
    }
  }

  // ---------- GitHub Gist backup (works 100% client-side, great for GitHub Pages) ----------
  async function pushToGist() {
    const token = prompt("Enter a GitHub Personal Access Token (gist scope) to save your cards to a private Gist.\nCreate one at: https://github.com/settings/tokens\n\nLeave blank to cancel:");
    if (!token) return;
    localStorage.setItem(GITHUB_GIST_TOKEN_KEY, token);

    const payload = {
      description: "Media Flow DB backup – " + new Date().toISOString(),
      public: false,
      files: {
        "media-flow-backup.json": {
          content: JSON.stringify({ 
            items: typeof allMedia !== "undefined" ? allMedia : [],
            links: typeof links !== "undefined" ? links : {},
            exportedAt: new Date().toISOString(),
            source: "media-flow-db-github-pages"
          }, null, 2)
        }
      }
    };

    try {
      const existingId = localStorage.getItem(GITHUB_GIST_ID_KEY);
      const url = existingId 
        ? `https://api.github.com/gists/${existingId}`
        : "https://api.github.com/gists";
      const method = existingId ? "PATCH" : "POST";
      
      const res = await fetch(url, {
        method,
        headers: {
          "Authorization": "token " + token,
          "Content-Type": "application/json",
          "Accept": "application/vnd.github.v3+json"
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      localStorage.setItem(GITHUB_GIST_ID_KEY, data.id);
      alert("✅ Saved to GitHub Gist!\n\nGist ID: " + data.id + "\nURL: " + data.html_url + "\n\nYou can restore this from any device.");
    } catch (e) {
      alert("Gist save failed: " + e.message + "\n\nMake sure your token has 'gist' scope.");
    }
  }

  async function pullFromGist() {
    const gistId = prompt("Enter Gist ID to restore from:", localStorage.getItem(GITHUB_GIST_ID_KEY) || "");
    if (!gistId) return;
    try {
      const token = localStorage.getItem(GITHUB_GIST_TOKEN_KEY);
      const headers = token ? { "Authorization": "token " + token } : {};
      const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
      if (!res.ok) throw new Error("Gist not found or private");
      const data = await res.json();
      const file = data.files["media-flow-backup.json"] || Object.values(data.files)[0];
      if (!file) throw new Error("No backup file found in Gist");
      const backup = JSON.parse(file.content);
      if (backup.items && Array.isArray(backup.items)) {
        if (typeof allMedia !== "undefined") {
          allMedia = backup.items;
          localStorage.setItem("media_flow_db_items_local", JSON.stringify(allMedia));
          if (backup.links && typeof links !== "undefined") {
            links = backup.links;
            localStorage.setItem("media_flow_db_links_local", JSON.stringify(links));
          }
          if (typeof render === "function") render();
          alert("☁️ Restored " + backup.items.length + " cards from GitHub Gist!");
          localStorage.setItem(GITHUB_GIST_ID_KEY, gistId);
        }
      } else {
        throw new Error("Invalid backup format");
      }
    } catch (e) {
      alert("Gist restore failed: " + e.message);
    }
  }

  function tryPushGistBackup() {
    // silent auto-backup if token exists – throttled to once per 2 minutes
    const token = localStorage.getItem(GITHUB_GIST_TOKEN_KEY);
    const lastKey = "media_flow_gist_last_push";
    const last = Number(localStorage.getItem(lastKey) || 0);
    if (!token || Date.now() - last < 120000) return;
    localStorage.setItem(lastKey, String(Date.now()));
    // fire and forget
    const gistId = localStorage.getItem(GITHUB_GIST_ID_KEY);
    if (!gistId) return;
    fetch(`https://api.github.com/gists/${gistId}`, {
      method: "PATCH",
      headers: {
        "Authorization": "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "media-flow-backup.json": {
            content: JSON.stringify({ 
              items: allMedia, 
              links: links, 
              exportedAt: new Date().toISOString(),
              auto: true
            }, null, 2)
          }
        }
      })
    }).catch(()=>{});
  }

  // Add Cloud Sync buttons to the UI after page renders
  setInterval(() => {
    const toolbar = document.querySelector("header .flex.flex-wrap.items-center.justify-end");
    if (toolbar && !document.getElementById("cloudSyncToolbarInject")) {
      const wrap = document.createElement("div");
      wrap.id = "cloudSyncToolbarInject";
      wrap.className = "flex items-center gap-1";
      wrap.innerHTML = `
        <button onclick="pushFullToCloud()" title="Push all cards to Firebase Cloud" style="display:inline-flex;align-items:center;gap:4px;border-radius:9999px;border:1px solid #bae6fd;background:#f0f9ff;padding:6px 10px;font-size:11px;font-weight:700;color:#0369a1;cursor:pointer">
          ☁️ Push
        </button>
        <button onclick="pullFromCloud()" title="Pull cards from Firebase Cloud" style="display:inline-flex;align-items:center;gap:4px;border-radius:9999px;border:1px solid #bbf7d0;background:#f0fdf4;padding:6px 10px;font-size:11px;font-weight:700;color:#15803d;cursor:pointer">
          ⬇️ Pull
        </button>
        <button onclick="pushToGist()" title="Backup to GitHub Gist (works on GitHub Pages!)" style="display:inline-flex;align-items:center;gap:4px;border-radius:9999px;border:1px solid #e2e8f0;background:white;padding:6px 10px;font-size:10px;font-weight:700;color:#334155;cursor:pointer">
          Gist ⬆️
        </button>
        <button onclick="pullFromGist()" title="Restore from GitHub Gist" style="display:inline-flex;align-items:center;gap:4px;border-radius:9999px;border:1px solid #e2e8f0;background:white;padding:6px 10px;font-size:10px;font-weight:700;color:#334155;cursor:pointer">
          Gist ⬇️
        </button>
      `;
      toolbar.insertBefore(wrap, toolbar.firstChild);
    }
  }, 900);

  // ================= END FIREBASE CLOUD SYNC =================
  </script>
</body>
