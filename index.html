<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Flow DB — Offline Edition</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>

  
<!-- Firebase App (compat CDN) for cloud sync – works on GitHub Pages -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

   <!-- Global Styles -->
<style>

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .carousel-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      border-width: 1px;
      font-size: 14px;
      font-weight: 500;
      transition-property: all;
      transition-duration: 200ms;
      cursor: pointer;
    }

    .progress-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      border-width: 1px;
      font-weight: 600;
      transition-property: all;
      transition-duration: 150ms;
      cursor: pointer;
    }

  .detail-image{
  width:100%;
  height:320px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--panel-soft);
  border-radius:20px;
  overflow:hidden;
}

.detail-image img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
}

  
  :root{
    --bg:#f8fafc; --panel:#ffffff; --panel-soft:#f1f5f9; --text:#0f172a; --muted:#64748b;
    --border:#e2e8f0; --primary:#4f46e5; --primary-2:#6366f1; --danger:#e11d48; --success:#10b981;
    --warning:#f59e0b; --shadow:0 24px 80px rgba(15,23,42,.12);
  }
  html.dark{
    --bg:#020617; --panel:#0f172a; --panel-soft:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
    --border:#1e293b; --shadow:0 24px 80px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; color:var(--text);
    background:
      radial-gradient(circle at top left, rgba(79,70,229,.16), transparent 32rem),
      radial-gradient(circle at top right, rgba(14,165,233,.12), transparent 30rem),
      var(--bg);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    transition:background .25s ease,color .25s ease;
  }
  button,input,select,textarea{font:inherit;}
  button{cursor:pointer;}
  img{max-width:100%;display:block;}
  .app-shell{width:min(1180px,calc(100% - 32px));margin:0 auto;}

  /* Topbar */ 
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border); background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(18px);} 
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 0 14px;flex-wrap:wrap;} 
.brand{display:flex;align-items:center;gap:12px;} 
.brand-badge{width:42px;height:42px;display:grid;place-items:center;border-radius:16px; background:linear-gradient(135deg,var(--primary),#06b6d4);color:#fff;font-size:20px; box-shadow:0 14px 40px rgba(79,70,229,.35);} 
.brand h1{margin:0;font-size:clamp(1.15rem,2vw,1.6rem);letter-spacing:-0.03em;} 
.brand p{margin:2px 0 0;color:var(--muted);font-size:.78rem;} 
.brand .eyebrow-mini{margin:0;color:var(--primary-2);font-size:.65rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;} 
.toolbar{display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:8px;} 
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:38px; border:1px solid var(--border);border-radius:999px;background:var(--panel);color:var(--text); padding:0 14px;font-size:.82rem;font-weight:700;transition:transform .18s ease,border-color .18s ease;} 
.btn:hover{transform:translateY(-1px);border-color:color-mix(in srgb,var(--primary) 42%,var(--border));} 
.btn.primary{border-color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;box-shadow:0 16px 38px rgba(79,70,229,.28);} 
.btn.danger{border-color:rgba(225,29,72,.25);color:var(--danger);} 
.btn.cloud-push{border-color:#bae6fd;background:#f0f9ff;color:#0369a1;} 
.btn.cloud-pull{border-color:#bbf7d0;background:#f0fdf4;color:#15803d;} 
html.dark .btn.cloud-push{background:rgba(3,105,161,.15);color:#7dd3fc;border-color:rgba(125,211,252,.3);} 
html.dark .btn.cloud-pull{background:rgba(21,128,61,.15);color:#86efac;border-color:rgba(134,239,172,.3);} 
.cloud-badge{display:inline-flex;align-items:center;gap:5px;border-radius:9999px;padding:4px 9px; font-size:.62rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase; background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3);} 
.cloud-badge .dot{width:6px;height:6px;border-radius:9999px;background:#10b981;animation:pulse 1.2s infinite;} @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}} 
.nav-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 0 14px;scrollbar-width:none;} 
.nav-scroll::-webkit-scrollbar{display:none;} 
.nav-pill{flex:0 0 auto;border:1px solid var(--border);border-radius:999px;background:var(--panel); color:var(--muted);padding:9px 16px;font-size:.82rem;font-weight:800;transition:all .18s ease;} 
.nav-pill.active{border-color:transparent;background:var(--text);color:var(--bg);} 

  /* Page head */
  .page-head{padding:26px 0 8px;}
  .page-head h2{margin:0 0 6px;font-size:clamp(1.6rem,3.4vw,2.4rem);letter-spacing:-0.04em;text-transform:capitalize;}
  .page-head .lead{margin:0 0 16px;max-width:760px;color:var(--muted);font-size:.92rem;line-height:1.6;}
  .search-box{position:relative;max-width:520px;}
  .search-box input{width:100%;height:46px;border:1px solid var(--border);border-radius:999px;
    background:var(--panel);color:var(--text);outline:none;padding:0 20px 0 44px;
    box-shadow:0 12px 30px rgba(15,23,42,.05);}
  .search-box input:focus{border-color:color-mix(in srgb,var(--primary) 50%,var(--border));}
  .search-box span{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
  .status-text{margin:12px 0 0;color:var(--muted);font-size:.78rem;font-weight:600;}

  /* Carousel */
  .carousel-stack{display:flex;flex-direction:column;gap:36px;margin-top:22px;}
  .carousel-section{display:flex;flex-direction:column;gap:12px;}
  .carousel-head{display:flex;align-items:center;justify-content:space-between;}
  .carousel-head h3{margin:0;font-size:1.2rem;letter-spacing:-0.03em;}
  .carousel-nav-group{display:flex;gap:8px;}
  .carousel-nav{width:36px;height:36px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
  .carousel-track{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:8px;scrollbar-width:none;}
  .carousel-track::-webkit-scrollbar{display:none;}
  .carousel-item{min-width:300px;max-width:300px;flex:0 0 auto;}
  .empty-inline{color:var(--muted);font-size:.85rem;padding:6px 2px;}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px;margin-top:22px;}

  /* Media card */
  .media-card{overflow:hidden;border-radius:26px;border:1px solid var(--border);
    background:color-mix(in srgb,var(--panel) 94%,transparent);
    box-shadow:0 20px 60px rgba(15,23,42,.08);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;}
  .media-card:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--primary) 44%,var(--border));box-shadow:var(--shadow);}
  .cover-wrap{position:relative;height:190px;overflow:hidden;background:var(--panel-soft);}
  .cover-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;}
  
  .media-card:hover .cover-wrap img{transform:scale(1.06);}
  .badge,.rating-badge{position:absolute;top:12px;border-radius:999px;padding:6px 10px;color:#fff;
    font-size:.65rem;font-weight:900;backdrop-filter:blur(12px);letter-spacing:.04em;text-transform:uppercase;}
  .badge{left:12px;background:rgba(15,23,42,.72);}
  .rating-badge{right:12px;background:rgba(245,158,11,.94);text-transform:none;}
  .card-body{padding:16px;}
  .card-title{margin:0;font-size:1rem;font-weight:900;letter-spacing:-0.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .description{min-height:40px;margin:9px 0 0;color:var(--muted);font-size:.82rem;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .genres{display:flex;flex-wrap:wrap;gap:5px;margin:12px 0;}
  .genre{border-radius:999px;background:var(--panel-soft);color:var(--muted);padding:4px 9px;font-size:.64rem;font-weight:800;}
  .progress-line{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:.72rem;font-weight:800;}
  .progress-bar{height:8px;overflow:hidden;border-radius:999px;background:var(--panel-soft);margin:7px 0 8px;}
  .progress-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--primary),#06b6d4);}
  .totals-text{margin:0 0 12px;color:var(--muted);font-size:.68rem;font-weight:700;}
  .progress-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .progress-controls.stacked{flex-direction:column;align-items:stretch;gap:8px;}
  .progress-row{display:flex;align-items:center;gap:8px;}
  .progress-label{width:56px;color:var(--muted);font-size:.7rem;font-weight:800;}
  .progress-btn{width:28px;height:28px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel-soft);color:var(--text);font-weight:900;display:inline-flex;align-items:center;justify-content:center;}
  .progress-btn.wide{width:auto;padding:0 10px;border-radius:999px;}
  .progress-value{min-width:56px;text-align:center;font-size:.75rem;font-weight:800;}
  .chip-toggle{border:1px solid var(--border);border-radius:999px;background:var(--panel-soft);color:var(--text);
    padding:5px 12px;font-size:.68rem;font-weight:800;}
  .chip-toggle.active{border-color:var(--success);background:var(--success);color:#fff;}
  .card-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--border);padding-top:12px;}
  .small-actions{display:flex;gap:6px;}
  .icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:999px;
    background:var(--panel-soft);color:var(--text);font-weight:800;}
  .icon-btn.danger{color:var(--danger);border-color:rgba(225,29,72,.25);}
  .text-btn{border:0;border-radius:999px;background:rgba(79,70,229,.12);color:var(--primary-2);
    padding:9px 14px;font-size:.72rem;font-weight:900;}

  .empty{border:1px dashed var(--border);border-radius:28px;padding:42px;text-align:center;color:var(--muted);margin-top:22px;}

  /* Overlay / Drawer / Modal */
  .overlay{position:fixed;inset:0;z-index:50;display:none;background:rgba(2,6,23,.6);backdrop-filter:blur(10px);}
  .overlay.open{display:block;}
  #drawerOverlay .drawer{position:absolute;right:0;top:0;height:100%;width:min(460px,100%);overflow-y:auto;
    padding:26px;background:var(--panel);box-shadow:var(--shadow);border-left:1px solid var(--border);}
  #modalOverlay{display:none;align-items:center;justify-content:center;padding:18px;}
  #modalOverlay.open{display:flex;}
  #modalOverlay .modal-card{width:min(760px,100%);max-height:92vh;overflow:auto;border-radius:28px;
    padding:24px;background:var(--panel);box-shadow:var(--shadow);border:1px solid var(--border);}
  .modal-head{display:flex;justify-content:space-between;gap:16px;align-items:start;
    border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:16px;}
  .modal-head h3{margin:0;font-size:1.4rem;letter-spacing:-0.04em;}
  .modal-head-actions{display:flex;gap:8px;}
  .eyebrow{margin:0 0 6px;color:var(--primary-2);font-size:.68rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;}
  .close-btn{border:0;width:36px;height:36px;border-radius:999px;background:var(--panel-soft);color:var(--text);font-weight:900;}

  .drawer-form .field{margin-bottom:14px;}
  .drawer-form .field label{display:block;margin:0 0 6px;color:var(--muted);font-size:.68rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
  .drawer-form input,.drawer-form select,.drawer-form textarea{width:100%;border:1px solid var(--border);
    border-radius:14px;background:var(--bg);color:var(--text);outline:none;padding:10px 12px;}
  .drawer-form textarea{min-height:90px;resize:vertical;}
  .checkbox-field label{display:flex;align-items:center;gap:8px;text-transform:none;font-weight:600;color:var(--text);}
  .form-actions{margin-top:8px;}
  .full-width{width:100%;}
  .season-editor{display:flex;flex-direction:column;gap:8px;}
  .season-row{display:flex;align-items:center;gap:8px;}
  .season-row span:first-child{width:80px;font-size:.72rem;color:var(--muted);font-weight:800;}
  .season-row .unit{width:auto;color:var(--muted);font-size:.7rem;}
  .relations-block{border-top:1px solid var(--border);padding-top:14px;}
  .relation-group{margin-bottom:14px;}
  .relation-label{display:block;margin-bottom:6px;font-size:.78rem;font-weight:800;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--panel-soft);
    color:var(--text);padding:5px 10px;font-size:.72rem;font-weight:700;}
  .chip-remove{border:0;background:transparent;color:var(--muted);font-weight:900;padding:0;}

  .detail-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;}
  .detail-layout>img{width:100%;height:320px;object-fit:cover;border-radius:20px;}
  .detail-meta{display:grid;gap:10px;}
  .detail-box{border:1px solid var(--border);border-radius:16px;background:var(--bg);padding:12px;color:var(--muted);font-size:.86rem;line-height:1.5;}
  .season-breakdown{display:flex;flex-direction:column;gap:6px;}
  .season-line{display:flex;justify-content:space-between;font-size:.76rem;}
  .description-box{color:var(--text);}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .linked-media{border:1px solid var(--border);border-radius:18px;padding:14px;background:var(--bg);display:flex;flex-direction:column;gap:12px;}
  .linked-media h4{margin:0;font-size:1rem;}
  .linked-label{display:block;margin-bottom:8px;font-size:.68rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .linked-group{display:flex;flex-direction:column;gap:8px;}
  .linked-row{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:14px;padding:8px;background:var(--panel);}
  .linked-row img{width:44px;height:44px;object-fit:cover;border-radius:10px;flex-shrink:0;}
  .linked-info{flex:1;min-width:0;}
  .linked-info p{margin:0;font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .linked-info span{font-size:.7rem;color:var(--muted);}

  @media (max-width:980px){
    .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    .detail-layout{grid-template-columns:1fr;}
    .detail-layout>img{height:220px;}
  }
@media (max-width:640px){

  /* Two smaller cards per row */
  .grid{
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:10px;
  }

  .media-card{
    border-radius:18px;
  }

  .cover-wrap{
    height:140px;
  }

  .card-body{
    padding:10px;
  }

  .card-title{
    font-size:.85rem;
  }

  .description{
    display:none; /* saves a lot of space */
  }

  .genres{
    margin:8px 0;
    gap:4px;
  }

  .genre{
    font-size:.55rem;
    padding:3px 6px;
  }

  .progress-line,
  .totals-text{
    font-size:.62rem;
  }

  .progress-controls{
    gap:6px;
  }

  .progress-btn{
    width:24px;
    height:24px;
  }

  .progress-value{
    min-width:42px;
    font-size:.65rem;
  }

  .text-btn{
    width:100%;
    padding:8px;
    font-size:.68rem;
  }

  .toolbar{
    justify-content:flex-start;
    width:100%;
  }

  #drawerOverlay .drawer{
    width:100%;
  }
}

@media screen and (max-width: 768px){

  .grid{
    grid-template-columns:repeat(2,1fr) !important;
    gap:10px !important;
  }

  .cover-wrap{
    height:130px !important;
  }

  .card-body{
    padding:10px !important;
  }

  .card-title{
    font-size:.85rem !important;
  }

}
  
</style>
</head>
<body>

    <!-- Core App Container --><div id="app"></div>

<header class="topbar">
  <div class="app-shell">
    <div class="topbar-inner">
      <div class="brand" id="cloudBadgeHost">
        <div class="brand-badge">🎬</div>
        <div>
          <h1>Hilary's Media Tracker</h1>
          <p>Offline Single-File Edition • Store: localStorage</p>
        </div>
      </div>
      <div class="toolbar">
<button class="btn cloud-push" id="cloudPushBtn" type="button" title="Push to Firebase Cloud">☁️ Push</button> 
<button class="btn cloud-pull" id="cloudPullBtn" type="button" title="Pull from Firebase Cloud">⬇️ Pull</button> 
<button class="btn" id="gistPushBtn" type="button" title="Backup to GitHub Gist">Gist ⬆</button> 
<button class="btn" id="gistPullBtn" type="button" title="Restore from GitHub Gist">Gist ⬇</button> 
<button class="btn" id="viewToggleBtn" type="button">Grid View</button> 
<button class="btn" id="darkToggleBtn" type="button">Dark Mode</button> 
<button class="btn primary" id="addCardBtn" type="button">+ Add Card</button>       </div>
    </div>
    <nav class="nav-scroll" id="categoryNav"></nav>
  </div>
</header>

<main class="app-shell">
  <section class="page-head">
    <h2 id="categoryHeading">Overall</h2>
    <p class="lead">My personal media collection. Each category tracks its own custom progress counters, sequels, and prequel graphs offline.</p>
    <div class="search-box">
      <span>⌕</span>
      <input id="searchInput" type="text" placeholder="Search title, description, genres..." />
    </div>
    <p class="status-text" id="statusText">System Log: Ready</p>
  </section>

  <div id="resultsContainer"></div>
</main>

<div class="overlay" id="drawerOverlay">
  <aside class="drawer" id="drawerAside"></aside>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal-card" id="modalContent"></div>
</div>

<script>
// ===== Constants =====
const STORAGE_ITEMS_KEY = "media_flow_db_items_local";
const STORAGE_LINKS_KEY = "media_flow_db_links_local";
const STORAGE_DARK_KEY = "media_flow_db_dark_local";
const STORAGE_VIEW_KEY = "media_flow_db_view_local";

const navItems = [
  { label: "Overall", value: "overall" },
  { label: "Movies", value: "movie" },
  { label: "Series", value: "series" },
  { label: "Dramas", value: "drama" },
  { label: "Manhwa", value: "manhwa" },
  { label: "Anime", value: "anime" },
  { label: "Books", value: "book" },
  { label: "Cartoons", value: "cartoon" },
];
const categoryLabel = {
  manhwa:"MANHWA", anime:"ANIME", series:"SERIES", drama:"DRAMA", movie:"MOVIE", book:"BOOK", cartoon:"CARTOON",
};
const fallbackCover = "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=1200&q=80";

const defaultSamples = [
  { _id:"sample-1", title:"Solo Leveling", category:"manhwa",
    coverImage:"https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=900&q=80",
    description:"In a world where hunters must battle deadly monsters to protect mankind, Sung Jinwoo, the weakest hunter of all mankind, finds himself in a struggle for survival.",
    genres:["Action","Fantasy","Adventure"], rating:9.3, recommended:true,
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
    progress:{ currentChapter:150, totalChapters:179 } },
  { _id:"sample-2", title:"Interstellar", category:"movie",
    coverImage:"https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=900&q=80",
    description:"A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",
    genres:["Sci-Fi","Drama","Space"], rating:9.5, recommended:true,
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),

  { _id:"sample-3", title:"Frieren: Beyond Journey's End", category:"anime",

function safeParse(value, fallback){
  try { return value ? JSON.parse(value) : fallback; } catch { return fallback; }

function escapeHtml(text){
  return String(text ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function escapeAttr(text){ return escapeHtml(text).replaceAll("`","&#096;"); }

// ===== Helpers (progress logic) =====
function clamp(value,min,max){ return Math.max(min,Math.min(max,value)); }
function makeSeasons(count){
  return Array.from({length:Math.max(count,1)},(_,i)=>({seasonNumber:i+1,totalEpisodes:12}));
}
function getSeasonEpisodes(progress,seasonNum){
  const entry = (progress.seasons||[]).find(s=>s.seasonNumber===seasonNum);
  return entry?.totalEpisodes ?? progress.totalEpisodes ?? 0;
}
function getTotalAllEpisodes(progress){
  if(progress.seasons && progress.seasons.length>0) return progress.seasons.reduce((s,x)=>s+x.totalEpisodes,0);
  return (progress.totalSeasons??1)*(progress.totalEpisodes??0);
}
function formatProgress(item){
  const {progress:p}=item;
  if(item.category==="manhwa") return `Chapter ${p.currentChapter??0} / ${p.totalChapters??0}`;
  if(["anime","cartoon","series","drama"].includes(item.category)){
    const eps=getSeasonEpisodes(p,p.currentSeason??1);
    return `Season ${p.currentSeason??1} - Episode ${p.currentEpisode??0} / ${eps}`;
  }
  if(item.category==="book") return `Page ${p.currentPage??0} / ${p.totalPages??0}`;
  return p.watched ? "Watched" : `Progress ${p.watchPercentage??0}%`;
}
function totalsSummary(item){
  const p=item.progress;
  if(item.category==="manhwa") return `Total Chapters: ${p.totalChapters??0}`;
  if(["anime","cartoon","series","drama"].includes(item.category)){
    return `Total Seasons: ${p.totalSeasons??0} | Total Episodes: ${getTotalAllEpisodes(p)}`;
  }
  if(item.category==="book") return `Total Pages: ${p.totalPages??0}`;
  if(typeof p.watchPercentage==="number") return `Total Watch Target: 100%`;
  return "Total Status: 1 completed movie";
}
function progressPercent(item){
  const p=item.progress;
  if(item.category==="manhwa"){
    const total=p.totalChapters||0;
    return total? clamp(Math.round(((p.currentChapter||0)/total)*100),0,100):0;
  }
  if(["anime","cartoon","series","drama"].includes(item.category)){
    const eps=getSeasonEpisodes(p,p.currentSeason||1);
    return eps? clamp(Math.round(((p.currentEpisode||0)/eps)*100),0,100):0;
  }
  if(item.category==="book"){
    const total=p.totalPages||0;
    return total? clamp(Math.round(((p.currentPage||0)/total)*100),0,100):0;
  }
  return p.watched?100:clamp(p.watchPercentage||0,0,100);
}
function getItemLinks(id){
  const rel=links[id];
  if(!rel) return {prequelIds:[],sequelIds:[]};
  return { prequelIds:rel.prequelIds||[], sequelIds:rel.sequelIds||[] };
}

// ===== Results rendering =====
function getFilteredMedia(){
  const term = searchTerm.trim().toLowerCase();
  let list = allMedia;
  if(activeCategory!=="overall") list = list.filter(i=>i.category===activeCategory);
  if(term) list = list.filter(i=> `${i.title} ${i.description} ${i.genres.join(" ")}`.toLowerCase().includes(term));
  return list;
}
function renderResults(){
  qs("categoryHeading").textContent = navItems.find(n=>n.value===activeCategory)?.label ?? "Overall";
  qs("statusText").textContent = `System Log: ${statusText}`;
  const filtered = getFilteredMedia();
  const container = qs("resultsContainer");
  if(viewMode==="carousel"){
    const sections = {
      recentlyUpdated: [...filtered].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,6),
      recommendations: filtered.filter(i=>i.rating>=8.5).slice(0,6),
      random: [...filtered].sort(()=>0.5-Math.random()).slice(0,6),
    };
    container.innerHTML = `<div class="carousel-stack">
      ${renderCarouselSection("Recently Updated", sections.recentlyUpdated, "carousel-recent")}
      ${renderCarouselSection("Recommendations", sections.recommendations, "carousel-recom")}
      ${renderCarouselSection("Random", sections.random, "carousel-random")}
    </div>`;
  } else {
    const sorted = [...filtered].sort((a, b) => (b.rating || 0) - (a.rating || 0));

container.innerHTML = sorted.length === 0
  ? `<div class="empty"><h3>No matching media</h3><p>Try a different search/category or add a new card.</p></div>`
  : `<div class="grid">${sorted.map(renderMediaCard).join("")}</div>`;
  }
}

// ===== Progress patch / delete / show =====
function handlePatchProgress(id, updates){
  allMedia = allMedia.map(item=>{
    if(item._id===id) return {...item, progress:{...item.progress, ...updates}, updatedAt:new Date().toISOString()};
    return item;
  });
  saveItems();
  firestoreMirrorUpdate(id, updates);
  if(selectedMedia && selectedMedia._id===id){
    selectedMedia = allMedia.find(m=>m._id===id);
    renderModalContent();
  }
  statusText = `Updated progress locally for card ${id}`;
  renderResults();
}
function deleteCard(id){
  if(!confirm("Are you sure you want to delete this media card?")) return;
  const next = {...links};
  delete next[id];
  Object.keys(next).forEach(key=>{
    next[key] = {
      prequelIds:(next[key].prequelIds||[]).filter(x=>x!==id),
      sequelIds:(next[key].sequelIds||[]).filter(x=>x!==id),
    };
  });
  links = next; saveLinks();
  allMedia = allMedia.filter(m=>m._id!==id);
  saveItems();
  if(addOpen && editingId===id) closeDrawer();
  if(selectedMedia && selectedMedia._id===id){ selectedMedia=null; renderModalContent(); }
  statusText = "Deleted media card";
  renderResults();
}
function handleShow(id){
  const item = allMedia.find(m=>m._id===id);
  if(item){ selectedMedia = item; renderModalContent(); }
}
function handleCloseDetails(){ selectedMedia = null; renderModalContent(); }

function handleEdit(id){
  const item = allMedia.find(m=>m._id===id);
  if(!item) return;
  const rel = getItemLinks(id);
  const totalSeasons = item.progress.totalSeasons || 1;
  const existingSeasons = item.progress.seasons || [];
  const seasons = Array.from({length:totalSeasons},(_,i)=>{
    const existing = existingSeasons.find(s=>s.seasonNumber===i+1);
    return {seasonNumber:i+1, totalEpisodes: existing?.totalEpisodes ?? item.progress.totalEpisodes ?? 12};
  });
  editingId = id;
  formState = {
    title:item.title, category:item.category, coverImage:item.coverImage, description:item.description,
    genres:item.genres.join(", "), rating:item.rating,
    currentChapter:item.progress.currentChapter||1, totalChapters:item.progress.totalChapters||100,
    currentEpisode:item.progress.currentEpisode||1, currentSeason:item.progress.currentSeason||1,
    totalSeasons, seasons,
    currentPage:item.progress.currentPage||1, totalPages:item.progress.totalPages||300,
    watched:item.progress.watched||false, watchPercentage:item.progress.watchPercentage||0,
    prequelIds:rel.prequelIds, sequelIds:rel.sequelIds,
  };
  openDrawer();
}

    qs("fCurrentSeason").value = formState.currentSeason;

    qs("fCurrentEpisode").addEventListener("input", e=>{ formState.currentEpisode = Number(e.target.value); });
    qs("fCurrentSeason").addEventListener("input", e=>{ formState.currentSeason = clamp(Number(e.target.value)||1,1,formState.totalSeasons); });
    qs("fTotalSeasons").addEventListener("input", e=>{
      const val = Math.max(Number(e.target.value)||1,1);
      const existing = formState.seasons || [];
      formState.seasons = Array.from({length:val},(_,i)=> i<existing.length ? existing[i] : {seasonNumber:i+1,totalEpisodes:12});
      formState.totalSeasons = val;
      formState.currentSeason = clamp(formState.currentSeason,1,val);
      renderSeasonEditor();
    });
    renderSeasonEditor();
  } else if(cat==="book"){
    wrap.innerHTML = `
      <div class="field"><label>Current Page</label><input id="fCurrentPage" type="number" min="0" /></div>
      <div class="field"><label>Total Pages</label><input id="fTotalPages" type="number" min="1" /></div>`;
    qs("fCurrentPage").value = formState.currentPage;
    qs("fTotalPages").value = formState.totalPages;
    qs("fCurrentPage").addEventListener("input", e=>{ formState.currentPage = Number(e.target.value); });
    qs("fTotalPages").addEventListener("input", e=>{ formState.totalPages = Number(e.target.value); });
  } else {
    wrap.innerHTML = `
      <div class="field"><label>Watch Percentage</label><input id="fWatchPct" type="number" min="0" max="100" /></div>
      <div class="field checkbox-field"><label><input id="fWatched" type="checkbox" /> Watched</label></div>`;
    qs("fWatchPct").value = formState.watchPercentage;
    qs("fWatched").checked = formState.watched;
    qs("fWatchPct").addEventListener("input", e=>{ formState.watchPercentage = Number(e.target.value); });
    qs("fWatched").addEventListener("change", e=>{ formState.watched = e.target.checked; });
  }
}
function renderSeasonEditor(){
  const el = qs("seasonEditor");
  if(!el) return;
  el.innerHTML = (formState.seasons||[]).map((s,idx)=>`
    <div class="season-row">
      <span>Season ${s.seasonNumber}</span>
      <input type="number" min="1" data-idx="${idx}" class="season-eps-input" value="${s.totalEpisodes}" />
      <span class="unit">eps</span>
    </div>`).join("");
  el.querySelectorAll(".season-eps-input").forEach(inp=>{
    inp.addEventListener("input", e=>{
      const idx = Number(e.target.dataset.idx);
      formState.seasons[idx] = { ...formState.seasons[idx], totalEpisodes: Math.max(Number(e.target.value)||1,1) };
    });
  });
}
function renderRelationsSection(){
  const wrap = qs("relationsWrap");
  const mediaOptions = allMedia.map(i=>({id:i._id, title:i.title}));
  const prequelOptions = mediaOptions.filter(o=> o.id!==editingId && !formState.sequelIds.includes(o.id) && !formState.prequelIds.includes(o.id));
  const sequelOptions = mediaOptions.filter(o=> o.id!==editingId && !formState.prequelIds.includes(o.id) && !formState.sequelIds.includes(o.id));
  wrap.innerHTML = `
    <div class="relations-block">
      <label class="relation-label" style="font-size:.78rem;font-weight:900;">Wiki Graph Links</label>
      <div class="relation-group">
        <span class="relation-label">Prequels</span>
        <select id="prequelSelect">
          <option value="">Select...</option>
          ${prequelOptions.map(o=>`<option value="${o.id}">${escapeHtml(o.title)}</option>`).join("")}
        </select>
        <div class="chip-row" id="prequelChips">
          ${formState.prequelIds.map(id=>{
            const m = allMedia.find(x=>x._id===id);
            return `<span class="chip">${m?escapeHtml(m.title):id}<button type="button" data-id="${id}" data-field="prequelIds" class="chip-remove">×</button></span>`;
          }).join("")}
        </div>
      </div>
      <div class="relation-group">
        <span class="relation-label">Sequels</span>
        <select id="sequelSelect">
          <option value="">Select...</option>
          ${sequelOptions.map(o=>`<option value="${o.id}">${escapeHtml(o.title)}</option>`).join("")}
        </select>
        <div class="chip-row" id="sequelChips">
          ${formState.sequelIds.map(id=>{
            const m = allMedia.find(x=>x._id===id);
            return `<span class="chip">${m?escapeHtml(m.title):id}<button type="button" data-id="${id}" data-field="sequelIds" class="chip-remove">×</button></span>`;
          }).join("")}
        </div>
      </div>
    </div>`;
  qs("prequelSelect").addEventListener("change", e=>{
    const val = e.target.value;
    if(val && !formState.prequelIds.includes(val)){ formState.prequelIds = [...formState.prequelIds, val]; renderRelationsSection(); }
  });
  qs("sequelSelect").addEventListener("change", e=>{
    const val = e.target.value;
    if(val && !formState.sequelIds.includes(val)){ formState.sequelIds = [...formState.sequelIds, val]; renderRelationsSection(); }
  });
  wrap.querySelectorAll(".chip-remove").forEach(btn=>{
    btn.addEventListener("click", e=>{
      const field = e.target.dataset.field, id = e.target.dataset.id;
      formState[field] = formState[field].filter(x=>x!==id);
      renderRelationsSection();
    });
  });
}

// ===== Submit / Save =====
function handleFormSubmit(e){
  e.preventDefault();
  if(!formState.title.trim()) return;
  const genresArray = formState.genres.split(",").map(g=>g.trim()).filter(Boolean);
  const cover = formState.coverImage.trim() || fallbackCover;

  let builtProgress = {};
  if(formState.category==="manhwa"){
    builtProgress = { currentChapter: clamp(formState.currentChapter,0,formState.totalChapters), totalChapters: Math.max(formState.totalChapters,1) };
  } else if(["anime","cartoon","series","drama"].includes(formState.category)){
    const totalSeasons = Math.max(formState.totalSeasons,1);
    const seasons = formState.seasons.slice(0,totalSeasons).map((s,i)=>({seasonNumber:i+1, totalEpisodes:Math.max(s.totalEpisodes,1)}));
    const currentSeason = clamp(formState.currentSeason,1,totalSeasons);
    const currentSeasonEps = seasons[currentSeason-1]?.totalEpisodes ?? 12;
    const totalEpisodes = seasons.reduce((sum,s)=>sum+s.totalEpisodes,0);
    builtProgress = { currentEpisode: clamp(formState.currentEpisode,0,currentSeasonEps), totalEpisodes, currentSeason, totalSeasons, seasons };
  } else if(formState.category==="book"){
    builtProgress = { currentPage: clamp(formState.currentPage,0,formState.totalPages), totalPages: Math.max(formState.totalPages,1) };
  } else {
    builtProgress = { watched: formState.watched, watchPercentage: clamp(formState.watchPercentage,0,100) };
  }

  const payload = {
    title: formState.title.trim(), category: formState.category, coverImage: cover,
    description: formState.description.trim() || "No description yet.",
    genres: genresArray, rating: formState.rating, recommended: formState.rating>=8.5,
    progress: builtProgress, updatedAt: new Date().toISOString(),
  };

  if(editingId){
    allMedia = allMedia.map(m=> m._id===editingId ? {...m, ...payload} : m);
    saveLinksState(editingId, formState.prequelIds, formState.sequelIds);
    statusText = `Updated media "${payload.title}"`;
  } else {
    const newId = `media-${Date.now()}`;
    const newItem = { _id:newId, ...payload, createdAt:new Date().toISOString() };
    allMedia = [newItem, ...allMedia];
    saveLinksState(newId, formState.prequelIds, formState.sequelIds);
    statusText = `Created media "${payload.title}"`;
  }
  saveItems();
  // Push to Firebase after save
  firestorePushAll();
  closeDrawer();
  renderResults();
}

function saveLinksState(targetId, prequelIds, sequelIds){
  const next = {...links};
  const oldRel = links[targetId] || {prequelIds:[],sequelIds:[]};
  for(const pid of (oldRel.prequelIds||[])){
    if(next[pid]) next[pid] = {...next[pid], sequelIds:(next[pid].sequelIds||[]).filter(s=>s!==targetId)};
  }
  for(const sid of (oldRel.sequelIds||[])){
    if(next[sid]) next[sid] = {...next[sid], prequelIds:(next[sid].prequelIds||[]).filter(p=>p!==targetId)};
  }
  next[targetId] = {prequelIds, sequelIds};
  for(const pid of prequelIds){
    const existing = next[pid] || {prequelIds:[],sequelIds:[]};
    const sequels = new Set(existing.sequelIds||[]); sequels.add(targetId);
    next[pid] = {...existing, sequelIds:[...sequels]};
  }
  for(const sid of sequelIds){
    const existing = next[sid] || {prequelIds:[],sequelIds:[]};
    const prequels = new Set(existing.prequelIds||[]); prequels.add(targetId);
    next[sid] = {...existing, prequelIds:[...prequels]};
  }
  links = next;
  saveLinks();
}

// ===== Init =====
function init(){
  const savedDark = localStorage.getItem(STORAGE_DARK_KEY);
  darkMode = savedDark ? savedDark==="true" : window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme();

  viewMode = localStorage.getItem(STORAGE_VIEW_KEY) || "carousel";

  const savedItems = localStorage.getItem(STORAGE_ITEMS_KEY);
  if(savedItems){ allMedia = safeParse(savedItems, [...defaultSamples]); }
  else { allMedia = [...defaultSamples]; saveItems(); }

  const savedLinks = localStorage.getItem(STORAGE_LINKS_KEY);
  if(savedLinks){ links = safeParse(savedLinks, {...defaultLinks}); }
  else { links = {...defaultLinks}; saveLinks(); }

  renderNav();
  updateToolbarButtons();
  renderResults();

  qs("searchInput").addEventListener("input", (e)=>{ searchTerm = e.target.value; renderResults(); });
  qs("viewToggleBtn").addEventListener("click", toggleViewMode);
  qs("darkToggleBtn").addEventListener("click", toggleDarkMode);
  qs("addCardBtn").addEventListener("click", triggerAddOpen);
  qs("cloudPushBtn")?.addEventListener("click", firestorePushAll );
  qs("cloudPullBtn")?.addEventListener("click", firestorePullAll);
  qs("gistPushBtn")?.addEventListener("click", pushToGist);
  qs("gistPullBtn")?.addEventListener("click", pullFromGist);
  qs("drawerOverlay").addEventListener("click", (e)=>{ if(e.target.id==="drawerOverlay") closeDrawer(); });
  qs("modalOverlay").addEventListener("click", (e)=>{ if(e.target.id==="modalOverlay") handleCloseDetails(); });
  window.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ closeDrawer(); handleCloseDetails(); } });
}
</script>

<script>
  // Firebase config
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCruSH9ICuKSnT_sYDqK5wmop68XVfJFmU",
    authDomain: "media-tracker-9c96d.firebaseapp.com",
    projectId: "media-tracker-9c96d",
    storageBucket: "media-tracker-9c96d.firebasestorage.app",
    messagingSenderId: "939264721067",
    appId: "1:939264721067:web:b6178fd243caee4c5bb7ee"
  };

  const GITHUB_GIST_TOKEN_KEY = "media_flow_gist_token";
  const GITHUB_GIST_ID_KEY = "media_flow_gist_id";

  let fbApp = null;
  let fbDb = null;
  let cloudEnabled = false;
  let cloudUnsub = null;

  // Initialize Firebase
  (function initFirebase() {
    try {
      if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) {
        console.log("Firebase not configured – using localStorage offline mode.");
        return;
      }
      if (typeof firebase === "undefined") {
        console.warn("Firebase SDK not loaded");
        return;
      }
      fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
      fbDb = firebase.firestore();
      cloudEnabled = true;

      // Show cloud badge in brand area
      const host = document.getElementById("cloudBadgeHost");
      if (host && !document.getElementById("cloudLiveBadge")) {
        const badge = document.createElement("span");
        badge.id = "cloudLiveBadge";
        badge.style.cssText = "display:inline-flex;align-items:center;gap:4px;border-radius:9999px;padding:3px 8px;font-size:10px;font-weight:900;letter-spacing:0.05em;text-transform:uppercase;background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3);margin-left:8px;";
        badge.innerHTML = '<span style="width:5px;height:5px;border-radius:9999px;background:#10b981;display:inline-block;animation:pulse 1.2s infinite"></span> Cloud';
        host.appendChild(badge);
      }

      // Real-time listener
      cloudUnsub = fbDb.collection("media_items").orderBy("updatedAt", "desc").limit(200)
        .onSnapshot((snap) => {
          const items = [];
          snap.forEach(doc => {
            const d = doc.data();
            items.push({
              _id: doc.id,
              title: d.title,
              category: d.category,
              coverImage: d.coverImage,
              description: d.description || "",
              genres: d.genres || [],
              rating: d.rating || 0,
              recommended: d.recommended || false,
              createdAt: d.createdAt?.toDate ? d.createdAt.toDate().toISOString() : new Date().toISOString(),
              updatedAt: d.updatedAt?.toDate ? d.updatedAt.toDate().toISOString() : new Date().toISOString(),
              progress: d.progress || {}
            });
          });
          if (items.length > 0 && typeof allMedia !== "undefined") {
            // Merge: use cloud items if they have more data
            allMedia = items;
            try { localStorage.setItem(STORAGE_ITEMS_KEY, JSON.stringify(allMedia)); } catch(e) {}
            if (typeof render === "function") render();
          }
        }, err => console.warn("Firestore listener error:", err.message));
        
      console.log("✅ Firebase Cloud Sync ACTIVE");
    } catch (e) {
      console.warn("Firebase init failed:", e.message);
    }
  })();

  // Push all local cards to Firestore
  async function firestorePushAll() {
    if (!cloudEnabled || !fbDb || typeof allMedia === "undefined") {
      alert("Firebase not configured. Add your config first.");
      return;
    }
    try {
      const batch = fbDb.batch();
      allMedia.slice(0, 500).forEach(item => {
        const ref = fbDb.collection("media_items").doc(item._id);
        batch.set(ref, {
          title: item.title,
          category: item.category,
          coverImage: item.coverImage,
          description: item.description || "",
          genres: item.genres || [],
          rating: item.rating || 0,
          recommended: item.recommended || false,
          progress: item.progress || {},
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      });
      await batch.commit();
      alert("✅ Pushed " + allMedia.length + " cards to Firebase!");
    } catch (e) {
      alert("Push failed: " + e.message);
    }
  }

  // Pull all cards from Firestore
  async function firestorePullAll() {
    if (!cloudEnabled || !fbDb) {
      alert("Firebase not configured.");
      return;
    }
    try {
      const snap = await fbDb.collection("media_items").orderBy("updatedAt", "desc").limit(200).get();
      const items = [];
      snap.forEach(doc => {
        const d = doc.data();
        items.push({
          _id: doc.id,
          title: d.title,
          category: d.category,
          coverImage: d.coverImage,
          description: d.description || "",
          genres: d.genres || [],
          rating: d.rating || 0,
          recommended: d.recommended || false,
          createdAt: d.createdAt?.toDate ? d.createdAt.toDate().toISOString() : new Date().toISOString(),
          updatedAt: d.updatedAt?.toDate ? d.updatedAt.toDate().toISOString() : new Date().toISOString(),
          progress: d.progress || {}
        });
      });
      if (items.length > 0 && typeof allMedia !== "undefined") {
        allMedia = items;
        localStorage.setItem(STORAGE_ITEMS_KEY, JSON.stringify(allMedia));
        if (typeof render === "function") render();
        alert("☁️ Pulled " + items.length + " cards from Firebase!");
      } else {
        alert("Cloud is empty – push first.");
      }
    } catch (e) {
      alert("Pull failed: " + e.message);
    }
  }

  // Mirror a single progress update to Firestore
  function firestoreMirrorUpdate(id, updates) {
    if (!cloudEnabled || !fbDb) return;
    fbDb.collection("media_items").doc(id).get().then(snap => {
      if (snap.exists) {
        const cur = snap.data().progress || {};
        return fbDb.collection("media_items").doc(id).update({
          progress: { ...cur, ...updates },
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }).catch(() => {});
  }

  // ===== GitHub Gist backup (100% client-side) =====
  async function pushToGist() {
    const token = prompt("Enter GitHub Personal Access Token (gist scope):\nhttps://github.com/settings/tokens");
    if (!token) return;
    localStorage.setItem(GITHUB_GIST_TOKEN_KEY, token);
    const payload = {
      description: "Media Flow DB backup - " + new Date().toISOString(),
      public: false,
      files: {
        "media-flow-backup.json": {
          content: JSON.stringify({
            items: typeof allMedia !== "undefined" ? allMedia : [],
            links: typeof links !== "undefined" ? links : {},
            exportedAt: new Date().toISOString()
          }, null, 2)
        }
      }
    };
    try {
      const existingId = localStorage.getItem(GITHUB_GIST_ID_KEY);
      const url = existingId ? `https://api.github.com/gists/${existingId}` : "https://api.github.com/gists";
      const method = existingId ? "PATCH" : "POST";
      const res = await fetch(url, {
        method,
        headers: {
          "Authorization": "token " + token,
          "Content-Type": "application/json",
          "Accept": "application/vnd.github.v3+json"
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      localStorage.setItem(GITHUB_GIST_ID_KEY, data.id);
      alert("✅ Saved to Gist!\nID: " + data.id);
    } catch (e) {
      alert("Gist save failed: " + e.message);
    }
  }

  async function pullFromGist() {
    const gistId = prompt("Enter Gist ID:", localStorage.getItem(GITHUB_GIST_ID_KEY) || "");
    if (!gistId) return;
    try {
      const token = localStorage.getItem(GITHUB_GIST_TOKEN_KEY);
      const headers = token ? { "Authorization": "token " + token } : {};
      const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
      if (!res.ok) throw new Error("Not found/private");
      const data = await res.json();
      const file = data.files["media-flow-backup.json"] || Object.values(data.files)[0];
      if (!file) throw new Error("No backup file");
      const backup = JSON.parse(file.content);
      if (Array.isArray(backup.items) && typeof allMedia !== "undefined") {
        allMedia = backup.items;
        localStorage.setItem(STORAGE_ITEMS_KEY, JSON.stringify(allMedia));
        if (backup.links && typeof links !== "undefined") {
          links = backup.links;
          localStorage.setItem(STORAGE_LINKS_KEY, JSON.stringify(links));
        }
        if (typeof render === "function") render();
        alert("☁️ Restored " + backup.items.length + " cards!");
        localStorage.setItem(GITHUB_GIST_ID_KEY, gistId);
      }
    } catch (e) {
      alert("Restore failed: " + e.message);
    }
  }

  // Bootstrap after everything loads
  document.addEventListener("DOMContentLoaded", init);
</script>
